<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link International — Select Branch</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background-color: #f5ede0;
            background-image:
                radial-gradient(ellipse at 15% 15%, rgba(210,158,0,.10) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 85%, rgba(180,120,0,.08) 0%, transparent 55%),
                linear-gradient(150deg, #f8f2e6 0%, #fdf9f2 45%, #ede3cf 100%);
        }

        /* Subtle dot grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(180,130,0,.055) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 0;
        }

        .page-wrap {
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 1;
            animation: fadeUp .65s cubic-bezier(.22,1,.36,1) both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(28px) scale(.98); }
            to   { opacity: 1; transform: translateY(0)    scale(1); }
        }

        /* ── Card ── */
        .card {
            background: #ffffff;
            border-radius: 22px;
            padding: 48px 44px 40px;
            border: 1px solid rgba(210,185,130,.35);
            box-shadow:
                0 2px 0 rgba(255,220,100,.25) inset,
                0 28px 72px rgba(160,110,0,.11),
                0 4px 18px rgba(0,0,0,.05);
            position: relative;
            overflow: hidden;
        }

        /* Gold top bar */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, #7a5c00 0%, #c8920a 30%, #f0c840 55%, #c8920a 75%, #7a5c00 100%);
        }

        /* Corner glow */
        .card::after {
            content: '';
            position: absolute;
            top: -80px; right: -80px;
            width: 220px; height: 220px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(210,158,0,.07) 0%, transparent 70%);
            pointer-events: none;
        }

        /* ── Logo ── */
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .wordmark {
            font-size: 32px;
            font-weight: 300;
            letter-spacing: -.5px;
            line-height: 1;
            background: linear-gradient(135deg, #7a5800, #c8920a 45%, #a07000);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .wordmark strong { font-weight: 800; }

        .logo-rule {
            width: 44px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4a017, transparent);
            margin: 0 auto 10px;
        }

        .tagline {
            font-size: 11px;
            color: #9a8560;
            letter-spacing: 2.2px;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* ── Welcome ── */
        .welcome-box {
            text-align: center;
            margin-bottom: 28px;
            padding: 14px 20px;
            background: linear-gradient(135deg, rgba(200,146,10,.06), rgba(210,158,0,.03));
            border: 1px solid rgba(210,185,130,.3);
            border-radius: 12px;
        }

        .welcome-greeting {
            font-size: 13px;
            color: #9a8560;
            font-weight: 500;
            letter-spacing: .3px;
        }

        .welcome-name {
            font-size: 18px;
            font-weight: 700;
            color: #1a1200;
            margin-top: 2px;
        }

        /* ── Section heading ── */
        .section-label {
            font-size: 10.5px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.8px;
            color: #b8a060;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(210,185,130,.35);
        }

        /* ── Branch cards ── */
        .branches-list {
            display: flex;
            flex-direction: column;
            gap: 9px;
        }

        .branch-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            background: #fdfaf4;
            border: 1.5px solid rgba(210,185,130,.4);
            border-radius: 13px;
            cursor: pointer;
            text-align: left;
            width: 100%;
            transition: border-color .2s, background .2s, transform .18s, box-shadow .2s;
            position: relative;
            overflow: hidden;
        }

        .branch-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,.6) 0%, transparent 60%);
            pointer-events: none;
        }

        .branch-btn:hover {
            border-color: #c8920a;
            background: #fffdf7;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(160,110,0,.12), 0 2px 6px rgba(0,0,0,.04);
        }

        .branch-btn:active {
            transform: translateY(0);
            box-shadow: none;
        }

        .branch-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(200,146,10,.12), rgba(210,158,0,.08));
            border: 1px solid rgba(200,146,10,.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c8920a;
            font-size: 16px;
            flex-shrink: 0;
            transition: background .2s, border-color .2s;
        }

        .branch-btn:hover .branch-icon {
            background: linear-gradient(135deg, rgba(200,146,10,.2), rgba(210,158,0,.14));
            border-color: rgba(200,146,10,.35);
        }

        .branch-info { flex: 1; min-width: 0; }

        .branch-name {
            font-size: 14.5px;
            font-weight: 600;
            color: #1a1200;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .branch-detail {
            font-size: 12px;
            color: #9a8560;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .branch-arrow {
            color: #c0a870;
            font-size: 12px;
            flex-shrink: 0;
            transition: color .2s, transform .2s;
        }

        .branch-btn:hover .branch-arrow {
            color: #c8920a;
            transform: translateX(3px);
        }

        /* Call-center variant */
        .branch-btn.call-center .branch-icon {
            background: linear-gradient(135deg, rgba(99,102,241,.1), rgba(139,92,246,.07));
            border-color: rgba(99,102,241,.2);
            color: #6366f1;
        }

        .branch-btn.call-center:hover {
            border-color: #6366f1;
            background: rgba(99,102,241,.03);
        }

        .branch-btn.call-center:hover .branch-icon {
            background: linear-gradient(135deg, rgba(99,102,241,.18), rgba(139,92,246,.12));
            border-color: rgba(99,102,241,.35);
        }

        .branch-btn.call-center:hover .branch-arrow { color: #6366f1; }

        /* ── Loading / empty states ── */
        .state-box {
            text-align: center;
            padding: 32px 16px;
            color: #9a8560;
            font-size: 13.5px;
            line-height: 1.6;
        }

        .state-box i {
            display: block;
            font-size: 28px;
            margin-bottom: 12px;
            opacity: .6;
        }

        .state-box.error i { color: #b03020; opacity: .8; }

        /* ── Divider ── */
        .divider {
            height: 1px;
            background: rgba(210,185,130,.3);
            margin: 28px 0 20px;
        }

        /* ── Sign out ── */
        .signout-row {
            text-align: center;
        }

        .btn-signout {
            background: transparent;
            border: none;
            color: #b8a880;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 6px 10px;
            border-radius: 8px;
            transition: color .2s, background .2s;
        }

        .btn-signout:hover {
            color: #b03020;
            background: rgba(176,48,32,.06);
        }

        /* ── Page footer ── */
        .page-footer {
            text-align: center;
            margin-top: 20px;
            color: #9a8560;
            font-size: 12px;
            animation: fadeUp .65s .12s cubic-bezier(.22,1,.36,1) both;
        }

        @media (max-width: 480px) {
            .card { padding: 36px 22px 32px; }
            .wordmark { font-size: 28px; }
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .fa-spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body>
    <div class="page-wrap">
        <div class="card">

            <!-- Logo -->
            <div class="logo">
                <div class="wordmark"><strong>Link</strong> international</div>
                <div class="logo-rule"></div>
                <div class="tagline">International Money Transfers</div>
            </div>

            <!-- Welcome -->
            <div class="welcome-box">
                <div class="welcome-greeting">Welcome back</div>
                <div class="welcome-name">{{ usuario }}</div>
            </div>

            <!-- Branch list -->
            <div class="section-label">
                <i class="fas fa-store" style="font-size:10px; color:#c8920a;"></i>
                Select your branch
            </div>

            <div class="branches-list" id="branchesList">
                <div class="state-box">
                    <i class="fas fa-spinner fa-spin"></i>
                    Loading branches…
                </div>
            </div>

            <div class="divider"></div>

            <!-- Sign out -->
            <div class="signout-row">
                <button class="btn-signout" onclick="window.location.href='/logout'">
                    <i class="fas fa-sign-out-alt"></i>
                    Sign out
                </button>
            </div>

        </div><!-- /card -->

        <footer class="page-footer">
            © 2025 Link International &nbsp;·&nbsp; v2.1.0
        </footer>
    </div>

    <script>
    (function () {
        async function carregarLojas() {
            const list = document.getElementById('branchesList');
            try {
                const r = await fetch('/api/loja/lojas-permitidas');
                const d = await r.json();

                if (!d.success || !d.lojas || !d.lojas.length) {
                    const extra = d.message ? `<br><small style="font-size:11px;opacity:.65;">${d.message}</small>` : '';
                    list.innerHTML = `<div class="state-box error"><i class="fas fa-exclamation-circle"></i>No branches available.<br>Please contact your administrator.${extra}</div>`;
                    return;
                }

                list.innerHTML = d.lojas.map(l => {
                    const isCC     = (l.codigo || '').toLowerCase().includes('call') || (l.tipo || '') === 'call_center';
                    const icon     = isCC ? 'fas fa-headset' : 'fas fa-store';
                    const cls      = isCC ? 'branch-btn call-center' : 'branch-btn';
                    const detalhe  = [l.cidade, l.endereco].filter(Boolean).join(' — ') || l.codigo || '';
                    const safeName = (l.nome || '').replace(/'/g, "\\'");
                    return `
                        <button class="${cls}" onclick="selecionar('${l.codigo}','${safeName}')">
                            <div class="branch-icon"><i class="${icon}"></i></div>
                            <div class="branch-info">
                                <div class="branch-name">${l.nome}</div>
                                ${detalhe ? `<div class="branch-detail">${detalhe}</div>` : ''}
                            </div>
                            <i class="fas fa-chevron-right branch-arrow"></i>
                        </button>`;
                }).join('');
            } catch (e) {
                list.innerHTML = `<div class="state-box error"><i class="fas fa-exclamation-triangle"></i>${e.message}</div>`;
            }
        }

        async function selecionar(codigo, nome) {
            const btn = document.querySelector(`[onclick*="${codigo}"]`);
            if (btn) {
                btn.style.opacity = '.7';
                btn.style.pointerEvents = 'none';
                btn.querySelector('.branch-arrow').className = 'fas fa-spinner fa-spin branch-arrow';
            }
            try {
                const r = await fetch('/api/loja/selecionar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ codigo })
                });
                const d = await r.json();
                if (d.success) {
                    window.location.href = '/loja/dashboard';
                } else {
                    if (btn) {
                        btn.style.opacity = '';
                        btn.style.pointerEvents = '';
                        btn.querySelector('.branch-arrow').className = 'fas fa-chevron-right branch-arrow';
                    }
                    alert(d.message || 'Unable to select branch. Please try again.');
                }
            } catch (e) {
                if (btn) {
                    btn.style.opacity = '';
                    btn.style.pointerEvents = '';
                    btn.querySelector('.branch-arrow').className = 'fas fa-chevron-right branch-arrow';
                }
                alert(e.message);
            }
        }

        window.selecionar = selecionar;
        carregarLojas();
    })();
    </script>
</body>
</html>
