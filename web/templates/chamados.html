<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <script>(function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('theme')||'light'); })();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link International — Suporte</title>
    <link rel="stylesheet" href="/static/css/theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root, :root[data-theme="dark"]{--cor-fundo:#110f08;--cor-card:#1e1b12;--cor-borda:#2d2819;--cor-texto:#f0e8d0;--cor-texto-sec:#9e9070;--cor-texto-secundario:#9e9070;--cor-primaria:#d29e00;--cor-admin:#d29e00;--cor-sucesso:#2ec27e;--cor-alerta:#f39c12;--cor-perigo:#e01b24;--sombra-suave:0 4px 6px rgba(0,0,0,.30);--radius:14px;--radius-sm:10px;}
        :root[data-theme="light"]{--cor-fundo:#f5ede0;--cor-card:#ffffff;--cor-borda:rgba(210,185,130,.4);--cor-texto:#1a1200;--cor-texto-sec:#9a8560;--cor-texto-secundario:#9a8560;--cor-primaria:#c8920a;--cor-admin:#c8920a;--cor-sucesso:#1a7a52;--cor-alerta:#b87200;--cor-perigo:#c02020;--sombra-suave:0 2px 8px rgba(160,110,0,.10),0 1px 3px rgba(0,0,0,.04);--radius:14px;--radius-sm:10px;}
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
        body { background-color:#110f08;background-image:linear-gradient(135deg,#110f08 0%,#1f1a10 100%); color:var(--cor-texto); height:100vh; overflow:hidden; display:flex; flex-direction:column; }
        html[data-theme="light"] body{background-color:#f5ede0;background-image:radial-gradient(ellipse at 15% 15%,rgba(210,158,0,.10) 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(180,120,0,.08) 0%,transparent 55%),linear-gradient(150deg,#f8f2e6 0%,#fdf9f2 45%,#ede3cf 100%);}

        .header { flex-shrink:0; max-width:1400px; margin:0 auto; width:100%; padding:20px 24px; display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; border-bottom:1px solid var(--cor-borda); }
        .logo { display:flex; align-items:center; gap:10px; font-size:17px; }
        .logo-text { background:linear-gradient(90deg,#b78700,#eeb600); -webkit-background-clip:text; background-clip:text; color:transparent; font-weight:800; }
        .logo-text span { font-weight:400; }
        .page-title { font-size:20px; font-weight:bold; flex:1; text-align:center; background:linear-gradient(90deg,#b78700,#eeb600); -webkit-background-clip:text; background-clip:text; color:transparent; }
        .hd-right { display:flex; align-items:center; gap:8px; }
        .btn-hd { background:rgba(210,158,0,.12); border:1px solid var(--cor-admin); color:var(--cor-admin); padding:5px 12px; border-radius:6px; cursor:pointer; font-size:12px; font-weight:600; text-decoration:none; display:inline-flex; align-items:center; gap:6px; white-space:nowrap; transition:.15s; }
        .btn-hd:hover { background:rgba(210,158,0,.25); }
        .btn-hd-ghost { background:transparent; border:1px solid var(--cor-borda); color:var(--cor-texto-sec); }
        .btn-hd-ghost:hover { border-color:var(--cor-admin); color:var(--cor-admin); }
        #btnTheme { background:transparent; border:1px solid var(--cor-borda); color:var(--cor-texto-sec); padding:0; border-radius:6px; cursor:pointer; font-size:14px; display:inline-flex; align-items:center; justify-content:center; height:30px; width:30px; transition:.15s; }
        #btnTheme:hover { border-color:var(--cor-admin); color:var(--cor-admin); }

        .main-layout { max-width:1400px; margin:0 auto; width:100%; display:grid; grid-template-columns:380px 1fr; flex:1; min-height:0; }

        /* LISTA */
        .lista-lado {
            border-right:1px solid var(--cor-borda); display:flex; flex-direction:column; overflow:hidden; min-height:0;
        }
        .lista-toolbar {
            padding:14px 16px; border-bottom:1px solid var(--cor-borda); background:var(--cor-card);
            display:flex; gap:8px; align-items:center;
        }
        .btn-novo {
            background:var(--cor-admin); color:#1a1200; border:none;
            padding:9px 18px; border-radius:var(--radius-sm); cursor:pointer;
            font-size:13px; font-weight:600; display:flex; align-items:center; gap:6px;
            transition:all .2s; white-space:nowrap;
        }
        .btn-novo:hover { background:#eeb600; }
        .filtro-status-cli {
            background:var(--cor-fundo) !important; border:1px solid var(--cor-borda) !important;
            color:var(--cor-texto) !important; padding:8px 10px !important;
            border-radius:var(--radius-sm) !important; font-size:13px !important;
            min-height:unset !important; flex:1;
        }
        .lista-scroll { flex:1; overflow-y:auto; }

        .chamado-item { padding:14px 16px; border-bottom:1px solid var(--cor-borda); cursor:pointer; transition:background .2s; }
        .chamado-item:hover { background:rgba(210,158,0,.07); }
        .chamado-item.ativo { background:rgba(210,158,0,.12); border-left:3px solid var(--cor-admin); }
        .chamado-item-header { display:flex; justify-content:space-between; margin-bottom:4px; }
        .chamado-id-small { font-size:11px; color:var(--cor-texto-sec); font-family:monospace; }
        .chamado-data-small { font-size:11px; color:var(--cor-texto-sec); }
        .chamado-titulo-item { font-size:14px; font-weight:600; margin-bottom:6px; }
        .chamado-meta-item { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
        .dot-novo { width:8px; height:8px; background:#e01b24; border-radius:50%; display:inline-block; margin-left:6px; vertical-align:middle; }

        .tag { font-size:11px; padding:2px 8px; border-radius:10px; font-weight:600; display:inline-block; white-space:nowrap; }
        .tag-aberto    { background:rgba(243,156,18,.15); color:#f39c12; }
        .tag-atendimento { background:rgba(52,152,219,.15); color:#3498db; }
        .tag-aguardando { background:rgba(155,89,182,.15); color:#9b59b6; }
        .tag-resolvido  { background:rgba(46,194,126,.15); color:#2ec27e; }
        .tag-fechado    { background:rgba(139,148,158,.15); color:#8b949e; }
        .tag-urgente    { background:rgba(224,27,36,.15); color:#e01b24; }
        .tag-alta       { background:rgba(243,156,18,.15); color:#f39c12; }
        .tag-normal     { background:rgba(52,152,219,.15); color:#3498db; }
        .tag-baixa      { background:rgba(139,148,158,.15); color:#8b949e; }
        .tag-cat-transferencia { background:rgba(52,152,219,.12); color:#3498db; }
        .tag-cat-cambio        { background:rgba(210,158,0,.12); color:var(--cor-admin); }
        .tag-cat-documentacao  { background:rgba(155,89,182,.12); color:#9b59b6; }
        .tag-cat-financeiro    { background:rgba(46,194,126,.12); color:#2ec27e; }
        .tag-cat-tecnico       { background:rgba(243,156,18,.12); color:#f39c12; }
        .tag-cat-outro         { background:rgba(139,148,158,.12); color:#8b949e; }

        .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:200px; color:var(--cor-texto-sec); gap:12px; text-align:center; padding:20px; }
        .empty-state i { font-size:40px; opacity:.3; }

        /* PAINEL DETALHE */
        .painel-detalhe { display:flex; flex-direction:column; background:var(--cor-fundo); overflow:hidden; min-height:0; }
        .detalhe-vazio { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; color:var(--cor-texto-sec); gap:16px; text-align:center; padding:40px; }
        .detalhe-vazio i { font-size:60px; opacity:.2; }
        .detalhe-vazio p { font-size:16px; }
        .detalhe-vazio small { font-size:13px; opacity:.7; }

        .detalhe-header { background:var(--cor-card); border-bottom:1px solid var(--cor-borda); padding:16px 24px; }
        .detalhe-titulo { font-size:18px; font-weight:700; margin-bottom:6px; }
        .detalhe-meta { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
        .meta-item { display:flex; align-items:center; gap:5px; font-size:13px; color:var(--cor-texto-sec); }

        .chat-area { flex:1; overflow-y:auto; padding:20px 24px; display:flex; flex-direction:column; gap:12px; min-height:0; }
        .msg-wrapper { display:flex; flex-direction:column; max-width:72%; gap:4px; }
        .msg-wrapper.cliente { align-self:flex-end; }
        .msg-wrapper.admin   { align-self:flex-start; }
        .msg-bubble { padding:10px 14px; border-radius:12px; font-size:14px; line-height:1.5; word-break:break-word; }
        .msg-wrapper.cliente .msg-bubble { background:rgba(210,158,0,.12); border:1px solid rgba(210,158,0,.25); border-radius:12px 12px 2px 12px; }
        .msg-wrapper.admin .msg-bubble { background:var(--cor-card); border:1px solid var(--cor-borda); border-radius:12px 12px 12px 2px; }
        .msg-meta { font-size:11px; color:var(--cor-texto-sec); display:flex; gap:8px; }
        .msg-wrapper.cliente .msg-meta { justify-content:flex-end; }
        .msg-day-sep { text-align:center; color:var(--cor-texto-sec); font-size:12px; padding:8px 0; display:flex; align-items:center; gap:10px; }
        .msg-day-sep::before, .msg-day-sep::after { content:''; flex:1; height:1px; background:var(--cor-borda); }

        .input-area { border-top:1px solid var(--cor-borda); padding:16px 24px; background:var(--cor-card); }
        .input-row { display:flex; gap:10px; align-items:flex-end; }
        .msg-textarea { flex:1; background:var(--cor-fundo) !important; border:1px solid var(--cor-borda) !important; color:var(--cor-texto) !important; border-radius:var(--radius-sm) !important; padding:10px 14px !important; font-size:14px !important; resize:none !important; min-height:60px !important; max-height:120px; line-height:1.5; }
        .msg-textarea:focus { border-color:var(--cor-primaria) !important; outline:none !important; box-shadow:none !important; }
        .btn-enviar { background:var(--cor-admin); color:#1a1200; border:none; padding:12px 20px; border-radius:var(--radius-sm); cursor:pointer; font-size:14px; font-weight:600; display:flex; align-items:center; gap:6px; transition:all .2s; white-space:nowrap; }
        .btn-enviar:hover { background:#eeb600; }
        .btn-enviar:disabled { opacity:.5; cursor:not-allowed; }

        /* MODAL NOVO CHAMADO */
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:1000; align-items:center; justify-content:center; }
        .modal-overlay.show { display:flex; }
        .modal-box { background:var(--cor-card); border:1px solid var(--cor-borda); border-radius:var(--radius); padding:28px; width:100%; max-width:520px; }
        .modal-title { font-size:18px; font-weight:700; margin-bottom:20px; display:flex; align-items:center; gap:10px; }
        .modal-title i { color:var(--cor-primaria); }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-size:13px; color:var(--cor-texto-sec); margin-bottom:6px; font-weight:500; }
        .form-group input, .form-group select, .form-group textarea {
            width:100%; background:var(--cor-fundo) !important; border:1px solid var(--cor-borda) !important;
            color:var(--cor-texto) !important; padding:10px 14px !important; border-radius:var(--radius-sm) !important;
            font-size:14px !important; min-height:unset !important;
        }
        .form-group textarea { min-height:100px !important; resize:vertical; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--cor-primaria) !important; outline:none !important; box-shadow:none !important; }
        .modal-footer { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }
        .btn-cancel { background:transparent; border:1px solid var(--cor-borda); color:var(--cor-texto); padding:10px 20px; border-radius:var(--radius-sm); cursor:pointer; font-size:14px; transition:all .2s; }
        .btn-cancel:hover { border-color:var(--cor-perigo); color:var(--cor-perigo); }
        .btn-submit { background:var(--cor-admin); color:#1a1200; border:none; padding:10px 24px; border-radius:var(--radius-sm); cursor:pointer; font-size:14px; font-weight:600; transition:all .2s; }
        .btn-submit:hover { background:#eeb600; }

        .typing-bubble { padding:4px 24px 0; flex-shrink:0; }
        .typing-dots { display:inline-flex; gap:4px; align-items:center; }
        .typing-dots span { width:6px; height:6px; background:var(--cor-texto-sec); border-radius:50%; animation:typing-dot 1.2s infinite; display:inline-block; }
        .typing-dots span:nth-child(2) { animation-delay:.2s; }
        .typing-dots span:nth-child(3) { animation-delay:.4s; }
        @keyframes typing-dot { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-4px);opacity:1} }
        .msg-receipt { font-size:10px; margin-left:4px; }
        .msg-receipt.sent { color:var(--cor-texto-sec); }
        .msg-receipt.read { color:#3498db; }
        .status-banner { padding:10px 24px; font-size:13px; display:flex; align-items:center; gap:8px; }
        .status-banner.resolvido { background:rgba(46,194,126,.08); color:var(--cor-sucesso); border-bottom:1px solid rgba(46,194,126,.2); }
        .status-banner.fechado { background:rgba(139,148,158,.08); color:var(--cor-texto-sec); border-bottom:1px solid var(--cor-borda); }

        .lang-switch { display:flex; gap:6px; align-items:center; }
        .lang-btn {
            background:transparent; border:1px solid var(--cor-borda); color:var(--cor-texto-sec);
            padding:6px 12px; border-radius:6px; font-size:12px; font-weight:600;
            text-decoration:none; transition:all .2s; display:inline-flex; align-items:center; height:32px;
        }
        .lang-btn:hover { border-color:var(--cor-admin); color:var(--cor-admin); }
        .lang-btn.active { background:var(--cor-admin); border-color:var(--cor-admin); color:#1a1200; }

        @media(max-width:768px) {
            .main-layout { grid-template-columns:1fr; }
            .painel-detalhe { display:none; }
            .painel-detalhe.show-mobile { display:flex; position:fixed; inset:0; z-index:100; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">
        <span class="logo-text"><strong>Link</strong><span> international</span></span>
    </div>
    <h1 class="page-title">Suporte</h1>
    <div class="hd-right">
        <a href="/language/{{ 'pt' if current_lang == 'en' else 'en' }}" class="btn-hd btn-hd-ghost"><i class="fas fa-globe"></i> {{ 'PT' if current_lang == 'en' else 'EN' }}</a>
        <button id="btnTheme" onclick="toggleTheme()" title="Alternar tema"><i class="fas fa-moon"></i></button>
        <a href="/dashboard" class="btn-hd btn-hd-ghost"><i class="fas fa-arrow-left"></i> Dashboard</a>
    </div>
</div>

<div class="main-layout">
    <!-- LISTA DE CHAMADOS -->
    <div class="lista-lado">
        <div class="lista-toolbar">
            <button class="btn-novo" onclick="abrirModalNovo()">
                <i class="fas fa-plus"></i> Novo Chamado
            </button>
            <select class="filtro-status-cli" id="filtroStatusCli" onchange="carregarChamados()">
                <option value="">Todos</option>
                <option value="aberto">Abertos</option>
                <option value="em_atendimento">Em atendimento</option>
                <option value="aguardando_cliente">Aguardando resposta</option>
                <option value="resolvido">Resolvidos</option>
                <option value="fechado">Fechados</option>
            </select>
        </div>
        <div class="lista-scroll" id="listaChamados">
            <div class="empty-state"><i class="fas fa-spinner fa-spin"></i><span>Carregando...</span></div>
        </div>
    </div>

    <!-- DETALHE / CHAT -->
    <div class="painel-detalhe" id="painelDetalhe">
        <div class="detalhe-vazio" id="detalheVazio">
            <i class="fas fa-headset"></i>
            <p>Seus chamados de suporte</p>
            <small>Clique em um chamado ou abra um novo para começar</small>
        </div>
        <div id="detalheConteudo" style="display:none;flex-direction:column;flex:1;overflow:hidden">
            <div class="detalhe-header">
                <div class="detalhe-titulo" id="detTitulo"></div>
                <div class="detalhe-meta" id="detMeta"></div>
            </div>
            <div id="statusBanner"></div>
            <div class="chat-area" id="chatArea"></div>
            <div id="typingBubble" class="typing-bubble" style="display:none">
                <div class="msg-wrapper admin" style="max-width:120px">
                    <div class="msg-bubble" style="padding:7px 12px">
                        <span class="typing-dots"><span></span><span></span><span></span></span>
                    </div>
                    <div class="msg-meta"><span>Suporte digitando...</span></div>
                </div>
            </div>
            <div class="input-area" id="inputArea">
                <div class="input-row">
                    <textarea class="msg-textarea" id="msgInput" placeholder="Digite sua mensagem..." rows="2"
                        onkeydown="if(event.key==='Enter'&&event.ctrlKey)enviarMensagem()"
                        oninput="onMsgTyping()"></textarea>
                    <button class="btn-enviar" id="btnEnviar" onclick="enviarMensagem()">
                        <i class="fas fa-paper-plane"></i> Enviar
                    </button>
                </div>
                <small style="color:var(--cor-texto-sec);font-size:11px;margin-top:6px;display:block">Ctrl+Enter para enviar</small>
            </div>
        </div>
    </div>
</div>

<!-- MODAL NOVO CHAMADO -->
<div class="modal-overlay" id="modalNovo">
    <div class="modal-box">
        <div class="modal-title"><i class="fas fa-plus-circle"></i> Abrir Novo Chamado</div>
        <div class="form-group">
            <label>Assunto *</label>
            <input type="text" id="novoTitulo" placeholder="Descreva brevemente o problema ou pedido">
        </div>
        <div class="form-group">
            <label>Categoria</label>
            <select id="novoCategoria">
                <option value="transferencia">Transferência</option>
                <option value="cambio">Câmbio</option>
                <option value="documentacao">Documentação</option>
                <option value="financeiro">Financeiro</option>
                <option value="tecnico">Técnico</option>
                <option value="outro" selected>Outro</option>
            </select>
        </div>
        <div class="form-group">
            <label>Prioridade</label>
            <select id="novoPrioridade">
                <option value="baixa">Baixa</option>
                <option value="normal" selected>Normal</option>
                <option value="alta">Alta</option>
                <option value="urgente">Urgente</option>
            </select>
        </div>
        <div class="form-group">
            <label>Mensagem inicial *</label>
            <textarea id="novoMensagem" placeholder="Descreva com detalhes o que precisa..."></textarea>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="fecharModalNovo()">Cancelar</button>
            <button class="btn-submit" onclick="criarChamado()"><i class="fas fa-paper-plane"></i> Abrir Chamado</button>
        </div>
    </div>
</div>

<script>
let chamadoAtual = null;
let _typingDebounce = null;
let _typingPoll = null;

const STATUS_LABEL = {
    aberto:'Aberto', em_atendimento:'Em atendimento',
    aguardando_cliente:'Aguardando resposta', resolvido:'Resolvido', fechado:'Fechado'
};
const STATUS_TAG = {
    aberto:'tag-aberto', em_atendimento:'tag-atendimento',
    aguardando_cliente:'tag-aguardando', resolvido:'tag-resolvido', fechado:'tag-fechado'
};
const PRIO_TAG   = { urgente:'tag-urgente', alta:'tag-alta', normal:'tag-normal', baixa:'tag-baixa' };
const PRIO_LABEL = { urgente:'Urgente', alta:'Alta', normal:'Normal', baixa:'Baixa' };
const PRIO_ICON  = { urgente:'fa-fire', alta:'fa-arrow-up', normal:'fa-minus', baixa:'fa-arrow-down' };
const CAT_LABEL  = {
    transferencia:'Transferência', cambio:'Câmbio', documentacao:'Documentação',
    financeiro:'Financeiro', tecnico:'Técnico', outro:'Outro'
};
const CAT_ICON   = {
    transferencia:'fa-exchange-alt', cambio:'fa-coins', documentacao:'fa-file-alt',
    financeiro:'fa-dollar-sign', tecnico:'fa-tools', outro:'fa-ellipsis-h'
};

function fmtData(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
}

function tempoRelativo(iso) {
    if (!iso) return '';
    const diff = Date.now() - new Date(iso).getTime();
    const min = Math.floor(diff / 60000);
    if (min < 1) return 'agora';
    if (min < 60) return `há ${min}min`;
    const h = Math.floor(diff / 3600000);
    if (h < 24) return `há ${h}h`;
    const dias = Math.floor(diff / 86400000);
    if (dias < 7) return `há ${dias}d`;
    return fmtData(iso);
}

function atualizarTimestamps() {
    document.querySelectorAll('[data-ts]').forEach(el => {
        el.textContent = tempoRelativo(el.dataset.ts);
    });
}

let _audioCtx = null;
function notifySound() {
    try {
        if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = _audioCtx.createOscillator();
        const gain = _audioCtx.createGain();
        osc.connect(gain); gain.connect(_audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, _audioCtx.currentTime);
        osc.frequency.setValueAtTime(1100, _audioCtx.currentTime + 0.12);
        gain.gain.setValueAtTime(0.08, _audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, _audioCtx.currentTime + 0.4);
        osc.start(_audioCtx.currentTime);
        osc.stop(_audioCtx.currentTime + 0.4);
    } catch(e) {}
}

function getLastSeen(id) { return parseInt(localStorage.getItem('cliLastSeen_' + id) || '0'); }
function setLastSeen(id) { localStorage.setItem('cliLastSeen_' + id, Date.now()); }
function isUnread(c) { return c.status === 'aguardando_cliente' && new Date(c.updated_at).getTime() > getLastSeen(c.id); }

let _prevUnlidos = -1;
function checkNotificacoes(lista) {
    const naoLidos = lista.filter(isUnread).length;
    const BASE = 'Link International — Suporte';
    document.title = naoLidos > 0 ? `(${naoLidos}) ${BASE}` : BASE;
    if (_prevUnlidos >= 0 && naoLidos > _prevUnlidos) notifySound();
    _prevUnlidos = naoLidos;
}

async function carregarChamados() {
    const status = document.getElementById('filtroStatusCli').value;
    const url = '/api/chamados/lista' + (status ? `?status=${status}` : '');
    try {
        const r = await fetch(url);
        const d = await r.json();
        if (d.success) { renderLista(d.chamados || []); checkNotificacoes(d.chamados || []); }
    } catch(e) { console.error(e); }
}

function renderLista(lista) {
    const el = document.getElementById('listaChamados');
    if (!lista.length) {
        el.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><span>Nenhum chamado.<br><small>Clique em "Novo Chamado" para abrir um.</small></span></div>`;
        return;
    }
    el.innerHTML = lista.map(c => {
        const ativo = chamadoAtual && chamadoAtual.id === c.id ? 'ativo' : '';
        const naoLido = isUnread(c) && !ativo ? '<span class="dot-novo"></span>' : '';
        return `
        <div class="chamado-item ${ativo}" onclick="abrirChamado('${c.id}', ${JSON.stringify(c).replace(/"/g,'&quot;')})">
            <div class="chamado-item-header">
                <span class="chamado-id-small">${c.id}${naoLido}</span>
                <span class="chamado-data-small" data-ts="${c.updated_at}" title="${fmtData(c.updated_at)}">${tempoRelativo(c.updated_at)}</span>
            </div>
            <div class="chamado-titulo-item">${c.titulo}</div>
            <div class="chamado-meta-item">
                <span class="tag ${STATUS_TAG[c.status]}">${STATUS_LABEL[c.status]}</span>
                <span class="tag ${PRIO_TAG[c.prioridade]}"><i class="fas ${PRIO_ICON[c.prioridade]}" style="font-size:9px"></i> ${PRIO_LABEL[c.prioridade]||c.prioridade}</span>
                <span class="tag tag-cat-${c.categoria}"><i class="fas ${CAT_ICON[c.categoria]||'fa-tag'}" style="font-size:9px"></i> ${CAT_LABEL[c.categoria]||c.categoria}</span>
            </div>
        </div>`;
    }).join('');
}

async function abrirChamado(id, dadosBasicos) {
    chamadoAtual = typeof dadosBasicos === 'object' ? dadosBasicos : {id};
    setLastSeen(id);
    document.getElementById('detalheVazio').style.display = 'none';
    const cont = document.getElementById('detalheConteudo');
    cont.style.display = 'flex';
    document.getElementById('chatArea').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;flex:1;gap:10px;color:var(--cor-texto-sec)"><i class="fas fa-spinner fa-spin"></i> Carregando...</div>';
    const r = await fetch(`/api/chamados/${id}`);
    const d = await r.json();
    if (d.success) {
        chamadoAtual = d.chamado;
        document.getElementById('detTitulo').textContent = chamadoAtual.titulo;
        renderDetMeta(chamadoAtual);
        renderStatusBanner(chamadoAtual);
        renderMensagens(d.mensagens);
        startTypingPoll(id);
        carregarChamados();
    }
}

function renderDetMeta(c) {
    document.getElementById('detMeta').innerHTML = `
        <div class="meta-item"><i class="fas fa-hashtag"></i> ${c.id}</div>
        <div class="meta-item"><i class="fas fa-tag"></i> ${CAT_LABEL[c.categoria] || c.categoria}</div>
        <div class="meta-item"><span class="tag ${STATUS_TAG[c.status]}">${STATUS_LABEL[c.status]}</span></div>
        <div class="meta-item"><span class="tag ${PRIO_TAG[c.prioridade]}">${c.prioridade}</span></div>
        <div class="meta-item"><i class="fas fa-calendar-plus"></i> ${fmtData(c.created_at)}</div>
    `;
}

function renderStatusBanner(c) {
    const el = document.getElementById('statusBanner');
    const inp = document.getElementById('inputArea');
    if (c.status === 'resolvido') {
        el.className = 'status-banner resolvido';
        el.innerHTML = '<i class="fas fa-check-circle"></i> Este chamado foi marcado como <strong>resolvido</strong>. Responda se ainda precisar de ajuda.';
        inp.style.display = 'block';
    } else if (c.status === 'fechado') {
        el.className = 'status-banner fechado';
        el.innerHTML = '<i class="fas fa-lock"></i> Este chamado está <strong>fechado</strong>.';
        inp.style.display = 'none';
    } else {
        el.className = '';
        el.innerHTML = '';
        inp.style.display = 'block';
    }
}

function receiptHtml(m) {
    if (m.autor_tipo !== 'cliente') return '';
    return m.lida_admin
        ? `<span class="msg-receipt read" title="Lida pelo suporte"><i class="fas fa-check-double"></i></span>`
        : `<span class="msg-receipt sent" title="Enviada"><i class="fas fa-check"></i></span>`;
}

function renderMensagens(msgs) {
    const chat = document.getElementById('chatArea');
    if (!msgs.length) {
        chat.innerHTML = '<div class="empty-state"><i class="fas fa-comment-slash"></i><span>Sem mensagens</span></div>';
        return;
    }
    let html = '';
    let ultimaData = '';
    msgs.forEach(m => {
        const dStr = new Date(m.created_at).toLocaleDateString('pt-BR');
        if (dStr !== ultimaData) {
            html += `<div class="msg-day-sep">${dStr}</div>`;
            ultimaData = dStr;
        }
        html += `
        <div class="msg-wrapper ${m.autor_tipo}">
            <div class="msg-bubble">${m.mensagem.replace(/\n/g,'<br>')}</div>
            <div class="msg-meta">
                <span>${m.autor_tipo === 'cliente' ? 'Você' : 'Suporte Link International'}</span>
                <span data-ts="${m.created_at}" title="${fmtData(m.created_at)}">${new Date(m.created_at).toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'})}</span>
                ${receiptHtml(m)}
            </div>
        </div>`;
    });
    chat.innerHTML = html;
    chat.scrollTop = chat.scrollHeight;
}

function onMsgTyping() {
    if (!chamadoAtual) return;
    clearTimeout(_typingDebounce);
    _typingDebounce = setTimeout(() => {
        fetch(`/api/chamados/${chamadoAtual.id}/typing`, {method:'POST'}).catch(()=>{});
    }, 300);
}

function startTypingPoll(id) {
    stopTypingPoll();
    _typingPoll = setInterval(async () => {
        try {
            const r = await fetch(`/api/chamados/${id}/typing_status`);
            const d = await r.json();
            const bubble = document.getElementById('typingBubble');
            if (bubble) bubble.style.display = d.typing ? 'block' : 'none';
        } catch(e) {}
    }, 2000);
}

function stopTypingPoll() {
    if (_typingPoll) { clearInterval(_typingPoll); _typingPoll = null; }
}

async function enviarMensagem() {
    if (!chamadoAtual) return;
    const texto = document.getElementById('msgInput').value.trim();
    if (!texto) return;
    const btn = document.getElementById('btnEnviar');
    btn.disabled = true;
    const r = await fetch(`/api/chamados/${chamadoAtual.id}/mensagem`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({mensagem: texto})
    });
    const d = await r.json();
    btn.disabled = false;
    if (d.success) {
        document.getElementById('msgInput').value = '';
        setLastSeen(chamadoAtual.id);
        abrirChamado(chamadoAtual.id, chamadoAtual);
    } else { alert('Erro: ' + d.error); }
}

function abrirModalNovo() { document.getElementById('modalNovo').classList.add('show'); }
function fecharModalNovo() {
    document.getElementById('modalNovo').classList.remove('show');
    document.getElementById('novoTitulo').value = '';
    document.getElementById('novoMensagem').value = '';
}

async function criarChamado() {
    const titulo = document.getElementById('novoTitulo').value.trim();
    const mensagem = document.getElementById('novoMensagem').value.trim();
    const categoria = document.getElementById('novoCategoria').value;
    const prioridade = document.getElementById('novoPrioridade').value;
    if (!titulo || !mensagem) { alert('Preencha o assunto e a mensagem.'); return; }
    const r = await fetch('/api/chamados/novo', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({titulo, mensagem, categoria, prioridade})
    });
    const d = await r.json();
    if (d.success) {
        fecharModalNovo();
        carregarChamados();
        setTimeout(() => abrirChamado(d.chamado_id, {id: d.chamado_id}), 300);
    } else { alert('Erro: ' + d.error); }
}

document.getElementById('modalNovo').addEventListener('click', e => {
    if (e.target === document.getElementById('modalNovo')) fecharModalNovo();
});

document.addEventListener('DOMContentLoaded', () => {
    carregarChamados();
    setInterval(carregarChamados, 15000);
    setInterval(atualizarTimestamps, 60000);
    window.addEventListener('focus', () => { atualizarTimestamps(); carregarChamados(); });
});
</script>
<script src="/static/js/theme.js"></script>
</body>
</html>
