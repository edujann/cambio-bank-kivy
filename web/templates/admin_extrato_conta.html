<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏦 Cambio Bank - Extrato da Conta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/theme.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --cor-fundo: #0a0e15;
            --cor-card: #0d1117;
            --cor-borda: #1e232e;
            --cor-texto: #e0e0e0;
            --cor-texto-secundario: #8b949e;
            --cor-primaria: #1a5fb4;
            --cor-admin: #1a5fb4;
            --cor-sucesso: #2ec27e;
            --cor-alerta: #f39c12;
            --cor-perigo: #e01b24;
            --sombra-suave: 0 4px 6px rgba(0, 0, 0, 0.3);
            --sombra-media: 0 8px 16px rgba(0, 0, 0, 0.4);
            --borda-radius: 12px;
            --borda-radius-pequeno: 8px;
        }

        body {
            background: var(--cor-fundo);
            color: var(--cor-texto);
            min-height: 100vh;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--cor-borda);
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: bold;
        }

        .logo i {
            color: var(--cor-admin);
            font-size: 28px;
        }

        .logo-text {
            background: linear-gradient(90deg, var(--cor-admin), #2d8fff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .page-title {
            font-size: 20px;
            font-weight: bold;
        }

        .btn-voltar {
            background: transparent;
            border: 1px solid var(--cor-borda);
            color: var(--cor-texto);
            padding: 10px 20px;
            border-radius: var(--borda-radius-pequeno);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-voltar:hover {
            border-color: var(--cor-admin);
            color: var(--cor-admin);
            transform: translateY(-2px);
        }

        .info-conta {
            background: var(--cor-card);
            border: 1px solid var(--cor-borda);
            border-radius: var(--borda-radius);
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .info-conta-item {
            flex: 1;
            text-align: center;
        }

        .info-conta-label {
            font-size: 12px;
            color: var(--cor-texto-secundario);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .info-conta-valor {
            font-size: 18px;
            font-weight: bold;
            color: var(--cor-primaria);
        }

        .resumo-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .resumo-card {
            background: var(--cor-card);
            border: 1px solid var(--cor-borda);
            border-radius: var(--borda-radius);
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .resumo-card:hover {
            transform: translateY(-3px);
            border-color: var(--cor-admin);
            box-shadow: var(--sombra-media);
        }

        .resumo-label {
            font-size: 12px;
            color: var(--cor-texto-secundario);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .resumo-valor {
            font-size: 24px;
            font-weight: bold;
        }

        .resumo-valor.positivo {
            color: var(--cor-sucesso);
        }

        .resumo-valor.negativo {
            color: var(--cor-perigo);
        }

        .tabela-container {
            background: var(--cor-card);
            border: 1px solid var(--cor-borda);
            border-radius: var(--borda-radius);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--cor-borda);
        }

        th {
            background: rgba(26, 95, 180, 0.1);
            color: var(--cor-admin);
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        tr:hover {
            background: rgba(26, 95, 180, 0.05);
        }

        .credito {
            color: var(--cor-perigo);
            font-weight: 600;
        }

        .debito {
            color: var(--cor-sucesso);
            font-weight: 600;
        }

        .btn-detalhe {
            background: var(--cor-admin);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: var(--borda-radius-pequeno);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .btn-detalhe:hover {
            background: #2d8fff;
            transform: translateY(-2px);
        }

        .btn-carregar-mais {
            background: var(--cor-card);
            border: 1px solid var(--cor-borda);
            color: var(--cor-texto);
            padding: 15px 30px;
            border-radius: var(--borda-radius-pequeno);
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-carregar-mais:hover {
            border-color: var(--cor-admin);
            color: var(--cor-admin);
            transform: translateY(-2px);
        }

        .btn-carregar-mais:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--cor-card);
            border: 1px solid var(--cor-borda);
            border-radius: var(--borda-radius);
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--cor-borda);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--cor-card);
        }

        .modal-header h3 {
            color: var(--cor-admin);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--cor-texto-secundario);
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            color: var(--cor-perigo);
            transform: scale(1.1);
        }

        .modal-body {
            padding: 20px;
        }

        .detalhe-grupo {
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(26, 95, 180, 0.05);
            border-radius: var(--borda-radius-pequeno);
            border-left: 3px solid var(--cor-admin);
        }

        .detalhe-grupo h4 {
            color: var(--cor-admin);
            margin-bottom: 10px;
            font-size: 14px;
        }

        .detalhe-linha {
            display: flex;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .detalhe-label {
            width: 140px;
            color: var(--cor-texto-secundario);
            font-weight: 600;
        }

        .detalhe-valor {
            flex: 1;
            color: var(--cor-texto);
        }

        .detalhe-valor strong {
            color: var(--cor-admin);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-completed { background: rgba(46, 194, 126, 0.2); color: var(--cor-sucesso); }
        .status-processing { background: rgba(243, 156, 18, 0.2); color: var(--cor-alerta); }
        .status-pending { background: rgba(243, 156, 18, 0.2); color: var(--cor-alerta); }
        .status-solicitada { background: rgba(243, 156, 18, 0.2); color: var(--cor-alerta); }
        .status-rejected { background: rgba(224, 27, 36, 0.2); color: var(--cor-perigo); }

        .footer-info {
            text-align: center;
            padding: 20px;
            color: var(--cor-texto-secundario);
            font-size: 12px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--cor-texto-secundario);
        }

        .loading i {
            font-size: 32px;
            margin-bottom: 10px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .resumo-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .info-conta {
                flex-direction: column;
                text-align: center;
            }
            .detalhe-linha {
                flex-direction: column;
            }
            .detalhe-label {
                width: 100%;
                margin-bottom: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <i class="fas fa-university"></i>
                <span class="logo-text">CAMBIO BANK</span>
            </div>
            <h1 class="page-title">EXTRATO BANCÁRIO</h1>
            <button class="btn-voltar" onclick="window.location.href='/admin/contas-bancarias'">
                <i class="fas fa-arrow-left"></i> Voltar
            </button>
        </header>

        <div class="info-conta" id="infoConta">
            <div class="info-conta-item">
                <div class="info-conta-label">Conta</div>
                <div class="info-conta-valor" id="contaNumero">-</div>
            </div>
            <div class="info-conta-item">
                <div class="info-conta-label">Banco</div>
                <div class="info-conta-valor" id="contaBanco">-</div>
            </div>
            <div class="info-conta-item">
                <div class="info-conta-label">Moeda</div>
                <div class="info-conta-valor" id="contaMoeda">-</div>
            </div>
        </div>

        <div class="resumo-grid">
            <div class="resumo-card">
                <div class="resumo-label">Saldo Atual</div>
                <div class="resumo-valor" id="saldoAtual">R$ 0,00</div>
            </div>
            <div class="resumo-card">
                <div class="resumo-label">Total Entradas</div>
                <div class="resumo-valor positivo" id="totalEntradas">R$ 0,00</div>
            </div>
            <div class="resumo-card">
                <div class="resumo-label">Total Saídas</div>
                <div class="resumo-valor negativo" id="totalSaidas">R$ 0,00</div>
            </div>
            <div class="resumo-card">
                <div class="resumo-label">Transações</div>
                <div class="resumo-valor" id="totalTransacoes">0</div>
            </div>
        </div>

        <div class="tabela-container">
            <table id="tabelaExtrato">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Descrição</th>
                        <th>Crédito (Saída)</th>
                        <th>Débito (Entrada)</th>
                        <th>Saldo</th>
                        <th style="width: 80px;">Detalhes</th>
                    </tr>
                </thead>
                <tbody id="extratoBody">
                    <tr>
                        <td colspan="6" class="loading">
                            <i class="fas fa-spinner fa-spin"></i> Carregando...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <button id="btnCarregarMais" class="btn-carregar-mais" onclick="carregarMaisTransacoes()" style="display: none;">
            <i class="fas fa-plus-circle"></i> Carregar mais 30 transações
        </button>

        <!-- 🔥 BOTÃO EXPORTAR PDF 🔥 -->
        <div style="display: flex; justify-content: flex-end; margin-top: 20px;">
            <button onclick="exportarExtratoPDF()" style="
                background: linear-gradient(135deg, #2ec27e, #27ae60);
                color: white;
                border: none;
                padding: 12px 24px;
                border-radius: 8px;
                font-weight: 600;
                cursor: pointer;
                display: inline-flex;
                align-items: center;
                gap: 8px;
                transition: all 0.3s ease;
            ">
                <i class="fas fa-file-pdf"></i> Exportar Extrato (PDF)
            </button>
        </div>

        <div class="footer-info">
            <i class="fas fa-info-circle"></i> Exibindo as transações mais recentes primeiro
        </div>
    </div>

    <div id="modalDetalhes" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-info-circle"></i> Detalhes da Transação</h3>
                <button class="modal-close" onclick="fecharModalDetalhes()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        let contaNumero = '{{ conta_numero }}';
        let todasTransacoes = [];      // Todas as transações (já vem na ordem correta da API)
        let transacoesExibidas = [];    // Transações atualmente na tela
        let itemsPorPagina = 30;        // Quantas transações carregar por vez
        let paginaAtual = 1;            // Página atual
        let carregando = false;
        let saldoFinalGlobal = 0;       // 🔥 NOVA VARIÁVEL PARA ARMAZENAR O SALDO FINAL

        document.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 Página de extrato carregada');
            if (contaNumero && contaNumero !== 'None') {
                carregarExtratoCompleto();
            } else {
                document.getElementById('extratoBody').innerHTML = '<tr><td colspan="6" class="loading">❌ Conta não especificada</td></tr>';
            }
        });

        async function carregarExtratoCompleto() {
            const tbody = document.getElementById('extratoBody');
            tbody.innerHTML = '<tr><td colspan="6" class="loading"><i class="fas fa-spinner fa-spin"></i> Carregando...</td></tr>';
            
            try {
                const response = await fetch('/api/admin/extrato-conta', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        conta_numero: contaNumero,
                        periodo: '0'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    todasTransacoes = data.transacoes || [];
                    
                    // 🔥 SALVAR O SALDO FINAL GLOBAL
                    saldoFinalGlobal = data.saldo_final || 0;
                    
                    console.log(`✅ ${todasTransacoes.length} transações carregadas`);
                    console.log(`💰 Saldo final (API): ${saldoFinalGlobal}`);
                    
                    if (todasTransacoes.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" class="loading">📭 Nenhuma transação encontrada</td></tr>';
                        atualizarResumo(data);
                        atualizarInfoConta(data);
                        return;
                    }
                    
                    atualizarInfoConta(data);
                    atualizarResumo(data);
                    
                    paginaAtual = 1;
                    transacoesExibidas = [];
                    carregarPagina();
                    
                } else {
                    tbody.innerHTML = `<tr><td colspan="6" class="loading">❌ ${data.message}</td></tr>`;
                }
            } catch (error) {
                console.error('❌ Erro:', error);
                tbody.innerHTML = '<tr><td colspan="6" class="loading">❌ Erro ao carregar extrato</td></tr>';
            }
        }

        function carregarPagina() {
            // 🔥 CALCULAR ÍNDICES (API já retorna do mais recente para o mais antigo)
            const inicio = 0;
            const fim = paginaAtual * itemsPorPagina;
            
            // 🔥 PEGAR AS TRANSAÇÕES ATÉ A PÁGINA ATUAL
            transacoesExibidas = todasTransacoes.slice(inicio, fim);
            
            console.log(`📊 Página ${paginaAtual}: exibindo ${transacoesExibidas.length} transações (até índice ${fim-1})`);
            
            // 🔥 RENDERIZAR TABELA
            renderizarTabela();
            
            // 🔥 VERIFICAR SE TEM MAIS PARA CARREGAR
            const temMais = fim < todasTransacoes.length;
            const botao = document.getElementById('btnCarregarMais');
            
            if (temMais) {
                const restantes = todasTransacoes.length - fim;
                botao.style.display = 'block';
                botao.innerHTML = `<i class="fas fa-plus-circle"></i> Carregar mais ${Math.min(itemsPorPagina, restantes)} transações (${restantes} restantes)`;
            } else {
                botao.style.display = 'none';
                console.log('📭 Todas as transações carregadas!');
            }
        }

        async function carregarMaisTransacoes() {
            if (carregando) return;
            carregando = true;
            
            const botao = document.getElementById('btnCarregarMais');
            const textoOriginal = botao.innerHTML;
            botao.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Carregando...';
            botao.disabled = true;
            
            try {
                paginaAtual++;
                carregarPagina();
            } catch (error) {
                console.error('❌ Erro:', error);
                alert('Erro ao carregar mais transações.');
            } finally {
                botao.innerHTML = textoOriginal;
                botao.disabled = false;
                carregando = false;
            }
        }

        function renderizarTabela() {
            const tbody = document.getElementById('extratoBody');
            
            if (!transacoesExibidas || transacoesExibidas.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="loading">Nenhuma transação encontrada</td></tr>';
                return;
            }
            
            tbody.innerHTML = '';
            
            // 🔥 USAR O SALDO FINAL GLOBAL (que veio da API)
            const saldoAtualValor = saldoFinalGlobal;
            
            console.log(`💰 renderizarTabela - Saldo atual (global): ${saldoAtualValor}`);
            
            for (let i = 0; i < transacoesExibidas.length; i++) {
                const t = transacoesExibidas[i];
                const row = tbody.insertRow();
                
                // Verificar se é a última linha (mais antiga)
                const isUltimaLinha = (i === transacoesExibidas.length - 1);
                
                row.insertCell(0).textContent = formatarData(t.data);
                row.insertCell(1).textContent = t.descricao || t.tipo || '-';
                
                const creditoCell = row.insertCell(2);
                creditoCell.textContent = t.credito > 0 ? formatarValor(t.credito) : '';
                creditoCell.className = 'credito';
                
                const debitoCell = row.insertCell(3);
                debitoCell.textContent = t.debito > 0 ? formatarValor(t.debito) : '';
                debitoCell.className = 'debito';
                
                const saldoCell = row.insertCell(4);
                // 🔥 Na última linha, usar o saldoFinalGlobal
                if (isUltimaLinha) {
                    saldoCell.textContent = formatarValor(saldoAtualValor);
                    console.log(`   Última linha - saldo exibido: ${formatarValor(saldoAtualValor)}`);
                } else {
                    saldoCell.textContent = formatarValor(t.saldo_apos);
                }
                saldoCell.className = t.saldo_apos < 0 ? 'negativo' : 'positivo';
                
                const detalheCell = row.insertCell(5);
                const btnDetalhe = document.createElement('button');
                btnDetalhe.className = 'btn-detalhe';
                btnDetalhe.innerHTML = '<i class="fas fa-search"></i> Ver';
                btnDetalhe.onclick = (function(transacao) {
                    return function() { abrirModalDetalhes(transacao); };
                })(t);
                detalheCell.appendChild(btnDetalhe);
            }
            
            console.log(`✅ Tabela renderizada com ${transacoesExibidas.length} transações`);
        }

        function atualizarInfoConta(data) {
            const moeda = data.moeda || 'USD';
            const simbolo = obterSimboloMoeda(moeda);
            document.getElementById('contaNumero').innerHTML = contaNumero;
            document.getElementById('contaBanco').innerHTML = data.conta_info?.banco || 'Conta Bancária';
            document.getElementById('contaMoeda').innerHTML = `${simbolo} ${moeda}`;
        }

        function atualizarResumo(data) {
            const moeda = data.moeda || 'USD';
            const simbolo = obterSimboloMoeda(moeda);
            
            document.getElementById('saldoAtual').innerHTML = `${simbolo} ${formatarValor(data.saldo_final || 0)}`;
            document.getElementById('totalEntradas').innerHTML = `${simbolo} ${formatarValor(data.total_entradas || 0)}`;
            document.getElementById('totalSaidas').innerHTML = `${simbolo} ${formatarValor(data.total_saidas || 0)}`;
            document.getElementById('totalTransacoes').innerHTML = data.quantidade || 0;
            
            if ((data.saldo_final || 0) < 0) {
                document.getElementById('saldoAtual').classList.add('negativo');
                document.getElementById('saldoAtual').classList.remove('positivo');
            } else {
                document.getElementById('saldoAtual').classList.add('positivo');
                document.getElementById('saldoAtual').classList.remove('negativo');
            }
        }

        function abrirModalDetalhes(transacao) {
            const modalBody = document.getElementById('modalBody');
            
            let statusClass = '';
            let statusText = transacao.status || 'completed';
            
            switch (statusText.toLowerCase()) {
                case 'completed': statusClass = 'status-completed'; statusText = 'CONCLUÍDA'; break;
                case 'processing': statusClass = 'status-processing'; statusText = 'EM PROCESSAMENTO'; break;
                case 'pending': case 'solicitada': statusClass = 'status-pending'; statusText = 'SOLICITADA'; break;
                case 'rejected': statusClass = 'status-rejected'; statusText = 'RECUSADA'; break;
                default: statusClass = 'status-processing';
            }
            
            const simbolo = obterSimboloMoeda(transacao.moeda || 'USD');
            const valorFormatado = formatarValor(transacao.credito > 0 ? transacao.credito : transacao.debito);
            
            let html = `
                <div class="detalhe-grupo">
                    <h4><i class="fas fa-tag"></i> Informações Básicas</h4>
                    <div class="detalhe-linha">
                        <div class="detalhe-label">ID da Transação:</div>
                        <div class="detalhe-valor"><strong>${transacao.id || 'N/A'}</strong></div>
                    </div>
                    <div class="detalhe-linha">
                        <div class="detalhe-label">Tipo:</div>
                        <div class="detalhe-valor">${transacao.tipo || 'N/A'}</div>
                    </div>
                    <div class="detalhe-linha">
                        <div class="detalhe-label">Status:</div>
                        <div class="detalhe-valor"><span class="status-badge ${statusClass}">${statusText}</span></div>
                    </div>
                    <div class="detalhe-linha">
                        <div class="detalhe-label">Data/Hora:</div>
                        <div class="detalhe-valor">${formatarDataCompleta(transacao.data)}</div>
                    </div>
                </div>
                
                <div class="detalhe-grupo">
                    <h4><i class="fas fa-coins"></i> Valores</h4>
                    <div class="detalhe-linha">
                        <div class="detalhe-label">Valor:</div>
                        <div class="detalhe-valor"><strong>${simbolo} ${valorFormatado} ${transacao.moeda || 'USD'}</strong></div>
                    </div>
            `;
            
            if (transacao.tipo === 'cambio' || transacao.operacao) {
                const valorOrigem = transacao.valor_origem || transacao.valor;
                const valorDestino = transacao.valor_destino;
                const moedaOrigem = transacao.moeda_origem || transacao.moeda;
                const moedaDestino = transacao.moeda_destino;
                const cotacao = transacao.cotacao;
                
                if (valorDestino && moedaDestino) {
                    html += `
                    <div class="detalhe-linha">
                        <div class="detalhe-label">Valor Origem:</div>
                        <div class="detalhe-valor">${formatarValor(valorOrigem)} ${moedaOrigem}</div>
                    </div>
                    <div class="detalhe-linha">
                        <div class="detalhe-label">Valor Destino:</div>
                        <div class="detalhe-valor">${formatarValor(valorDestino)} ${moedaDestino}</div>
                    </div>
                    <div class="detalhe-linha">
                        <div class="detalhe-label">Cotação:</div>
                        <div class="detalhe-valor">1 ${moedaOrigem} = ${cotacao} ${moedaDestino}</div>
                    </div>
                    `;
                }
            }
            
            html += `</div>`;
            
            if (transacao.beneficiario) {
                html += `
                <div class="detalhe-grupo">
                    <h4><i class="fas fa-user"></i> Beneficiário</h4>
                    <div class="detalhe-linha"><div class="detalhe-label">Nome:</div><div class="detalhe-valor">${transacao.beneficiario || 'N/A'}</div></div>
                    <div class="detalhe-linha"><div class="detalhe-label">Endereço:</div><div class="detalhe-valor">${transacao.endereco_beneficiario || 'N/A'}</div></div>
                    <div class="detalhe-linha"><div class="detalhe-label">Cidade/País:</div><div class="detalhe-valor">${transacao.cidade || 'N/A'} / ${transacao.pais || 'N/A'}</div></div>
                </div>
                
                <div class="detalhe-grupo">
                    <h4><i class="fas fa-university"></i> Banco do Beneficiário</h4>
                    <div class="detalhe-linha"><div class="detalhe-label">Banco:</div><div class="detalhe-valor">${transacao.nome_banco || 'N/A'}</div></div>
                    <div class="detalhe-linha"><div class="detalhe-label">SWIFT:</div><div class="detalhe-valor"><strong>${transacao.codigo_swift || 'N/A'}</strong></div></div>
                    <div class="detalhe-linha"><div class="detalhe-label">IBAN:</div><div class="detalhe-valor">${transacao.iban_account || 'N/A'}</div></div>
                    ${transacao.aba_routing ? `<div class="detalhe-linha"><div class="detalhe-label">ABA/Routing:</div><div class="detalhe-valor">${transacao.aba_routing}</div></div>` : ''}
                </div>
                `;
            }
            
            html += `
                <div class="detalhe-grupo">
                    <h4><i class="fas fa-info-circle"></i> Informações Adicionais</h4>
                    <div class="detalhe-linha"><div class="detalhe-label">Descrição:</div><div class="detalhe-valor">${transacao.descricao || 'N/A'}</div></div>
                    <div class="detalhe-linha"><div class="detalhe-label">Conta Origem:</div><div class="detalhe-valor">${transacao.conta_remetente || transacao.conta_origem || 'N/A'}</div></div>
                    <div class="detalhe-linha"><div class="detalhe-label">Conta Destino:</div><div class="detalhe-valor">${transacao.conta_destinatario || transacao.conta_destino || 'N/A'}</div></div>
            `;
            
            if (transacao.motivo_recusa) {
                html += `<div class="detalhe-linha"><div class="detalhe-label">Motivo da Recusa:</div><div class="detalhe-valor" style="color: var(--cor-perigo);">${transacao.motivo_recusa}</div></div>`;
            }
            
            if (transacao.data_solicitacao) html += `<div class="detalhe-linha"><div class="detalhe-label">Data Solicitação:</div><div class="detalhe-valor">${formatarDataCompleta(transacao.data_solicitacao)}</div></div>`;
            if (transacao.data_aprovacao) html += `<div class="detalhe-linha"><div class="detalhe-label">Data Aprovação:</div><div class="detalhe-valor">${formatarDataCompleta(transacao.data_aprovacao)}</div></div>`;
            if (transacao.data_conclusao) html += `<div class="detalhe-linha"><div class="detalhe-label">Data Conclusão:</div><div class="detalhe-valor">${formatarDataCompleta(transacao.data_conclusao)}</div></div>`;
            
            html += `</div>`;
            
            modalBody.innerHTML = html;
            document.getElementById('modalDetalhes').classList.add('active');
        }
        
        function fecharModalDetalhes() {
            document.getElementById('modalDetalhes').classList.remove('active');
        }

        function formatarValor(valor) {
            if (valor === undefined || valor === null) return '0,00';
            return valor.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function formatarData(dataStr) {
            if (!dataStr) return '';
            try {
                if (dataStr.includes('T')) {
                    const data = new Date(dataStr);
                    return data.toLocaleDateString('pt-BR');
                }
                if (dataStr.includes(' ')) {
                    const [dataPart] = dataStr.split(' ');
                    const [ano, mes, dia] = dataPart.split('-');
                    return `${dia}/${mes}/${ano}`;
                }
                if (dataStr.includes('-')) {
                    const [ano, mes, dia] = dataStr.split('-');
                    return `${dia}/${mes}/${ano}`;
                }
                return dataStr;
            } catch {
                return dataStr;
            }
        }
        
        function formatarDataCompleta(dataStr) {
            if (!dataStr) return '';
            try {
                if (dataStr.includes('T')) {
                    const data = new Date(dataStr);
                    return data.toLocaleDateString('pt-BR') + ' ' + data.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                }
                if (dataStr.includes(' ')) {
                    const [dataPart, horaPart] = dataStr.split(' ');
                    const [ano, mes, dia] = dataPart.split('-');
                    return `${dia}/${mes}/${ano} ${horaPart.substring(0, 5)}`;
                }
                return dataStr;
            } catch {
                return dataStr;
            }
        }

        function obterSimboloMoeda(moeda) {
            const simbolos = { USD: '$', EUR: '€', GBP: '£', BRL: 'R$' };
            return simbolos[moeda] || moeda;
        }
        
        // ============================================
        // EXPORTAR EXTRATO PARA PDF
        // ============================================
        async function exportarExtratoPDF() {
            if (!contaNumero || todasTransacoes.length === 0) {
                alert('❌ Nenhuma transação para exportar');
                return;
            }
            
            // Encontrar o botão
            const botoes = document.querySelectorAll('button');
            let btnExportar = null;
            for (const btn of botoes) {
                if (btn.innerText.includes('Exportar Extrato')) {
                    btnExportar = btn;
                    break;
                }
            }
            
            if (!btnExportar) return;
            
            const textoOriginal = btnExportar.innerHTML;
            
            try {
                btnExportar.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Gerando PDF...';
                btnExportar.disabled = true;
                
                // Obter a moeda
                let moeda = 'USD';
                const moedaEl = document.getElementById('contaMoeda');
                if (moedaEl) {
                    const moedaText = moedaEl.innerText;
                    const match = moedaText.match(/\$|€|£|R\$/);
                    if (match) {
                        if (match[0] === '$') moeda = 'USD';
                        else if (match[0] === '€') moeda = 'EUR';
                        else if (match[0] === '£') moeda = 'GBP';
                        else if (match[0] === 'R$') moeda = 'BRL';
                    }
                }
                
                // Calcular totais a partir de todas as transações
                let totalEntradasCalc = 0;
                let totalSaidasCalc = 0;
                for (const t of todasTransacoes) {
                    totalEntradasCalc += t.debito || 0;
                    totalSaidasCalc += t.credito || 0;
                }
                
                // Obter saldo final (última transação)
                let saldoFinal = 0;
                if (todasTransacoes.length > 0) {
                    saldoFinal = todasTransacoes[todasTransacoes.length - 1]?.saldo_apos || 0;
                }
                
                // Preparar dados para o PDF
                const dadosPDF = {
                    conta: contaNumero,
                    periodo: 'Todo período',
                    transacoes: todasTransacoes.map(t => ({
                        ...t,
                        data_formatada: formatarData(t.data)
                    })),
                    resumo: {
                        saldo_final: saldoFinal,
                        total_entradas: totalEntradasCalc,
                        total_saidas: totalSaidasCalc,
                        total_transacoes: todasTransacoes.length,
                        moeda: moeda
                    }
                };
                
                console.log('📄 Gerando PDF com', todasTransacoes.length, 'transações');
                
                const response = await fetch('/api/extrato/exportar-pdf', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dadosPDF)
                });
                
                const data = await response.json();
                
                // 🔥 LOGS DE DEBUG - ADICIONAR AQUI 🔥
                console.log('🔍 DATA COMPLETO:', data);
                console.log('🔍 data.saldo_final:', data.saldo_final);
                console.log('🔍 data.total_entradas:', data.total_entradas);
                console.log('🔍 data.total_saidas:', data.total_saidas);
                console.log('🔍 data.transacoes length:', data.transacoes?.length);
                
                if (data.success && data.pdf_url) {
                    window.open(data.pdf_url, '_blank');
                    alert('✅ PDF gerado com sucesso!');
                } else {
                    throw new Error(data.message || 'Erro ao gerar PDF');
                }
                
            } catch (error) {
                console.error('❌ Erro ao exportar PDF:', error);
                alert('❌ Erro ao gerar PDF: ' + error.message);
            } finally {
                btnExportar.innerHTML = textoOriginal;
                btnExportar.disabled = false;
            }
        }

        document.addEventListener('click', function(event) {
            const modal = document.getElementById('modalDetalhes');
            if (event.target === modal) fecharModalDetalhes();
        });
    </script>
    <script src="/static/js/theme.js"></script>
</body>
