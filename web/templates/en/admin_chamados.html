<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambio Bank - B2B Support Tickets</title>
    <link rel="stylesheet" href="/static/css/theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
        :root {
            --cor-fundo:#0a0e15; --cor-card:#0d1117; --cor-borda:#1e232e;
            --cor-texto:#e0e0e0; --cor-texto-sec:#8b949e;
            --cor-primaria:#1a5fb4; --cor-sucesso:#2ec27e;
            --cor-alerta:#f39c12; --cor-perigo:#e01b24;
            --radius:12px; --radius-sm:8px;
        }
        body { background:var(--cor-fundo); color:var(--cor-texto); min-height:100vh; }
        .header {
            background:var(--cor-fundo); border-bottom:1px solid var(--cor-borda);
            padding:16px 24px; display:flex; align-items:center; justify-content:space-between;
        }
        .header-left { display:flex; align-items:center; gap:12px; }
        .header-left h1 { font-size:20px; font-weight:700; background:linear-gradient(90deg,var(--cor-primaria),#2d8fff); -webkit-background-clip:text; background-clip:text; color:transparent; }
        .header-left h1 i { color:var(--cor-primaria); margin-right:8px; -webkit-background-clip:unset; background-clip:unset; }
        .btn-back {
            background:transparent; border:1px solid var(--cor-borda); color:var(--cor-texto);
            padding:8px 16px; border-radius:var(--radius-sm); cursor:pointer;
            display:flex; align-items:center; gap:6px; font-size:14px; text-decoration:none;
            transition:all .2s;
        }
        .btn-back:hover { border-color:var(--cor-primaria); color:var(--cor-primaria); }
        .filtros-bar {
            background:var(--cor-card); border-bottom:1px solid var(--cor-borda);
            padding:12px 24px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;
        }
        .filtros-bar select, .filtros-bar input {
            background:var(--cor-card) !important; border:1px solid var(--cor-borda) !important;
            color:var(--cor-texto) !important; padding:8px 12px !important;
            border-radius:var(--radius-sm) !important; font-size:13px !important;
            min-height:unset !important; min-width:150px;
        }
        .filtros-bar select:focus, .filtros-bar input:focus {
            border-color:var(--cor-primaria) !important; outline:none !important; box-shadow:none !important;
        }
        .badge-count { background:rgba(26,95,180,.15); color:var(--cor-primaria); padding:4px 12px; border-radius:20px; font-size:13px; font-weight:600; margin-left:auto; }
        .main-layout { display:grid; grid-template-columns:400px 1fr; height:calc(100vh - 113px); }
        .lista-chamados { border-right:1px solid var(--cor-borda); overflow-y:auto; background:var(--cor-fundo); }
        .chamado-item { padding:16px 20px; border-bottom:1px solid var(--cor-borda); cursor:pointer; transition:background .2s; position:relative; }
        .chamado-item:hover { background:rgba(26,95,180,.07); }
        .chamado-item.ativo { background:rgba(26,95,180,.12); border-left:3px solid var(--cor-primaria); }
        .chamado-item-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; }
        .chamado-id { font-size:11px; color:var(--cor-texto-sec); font-family:monospace; }
        .chamado-data { font-size:11px; color:var(--cor-texto-sec); white-space:nowrap; }
        .chamado-titulo { font-size:14px; font-weight:600; margin-bottom:4px; }
        .chamado-cliente { font-size:12px; color:var(--cor-primaria); margin-bottom:8px; }
        .chamado-meta { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
        .tag { font-size:11px; padding:2px 8px; border-radius:10px; font-weight:600; display:inline-block; white-space:nowrap; }
        .tag-aberto    { background:rgba(243,156,18,.15); color:#f39c12; }
        .tag-atendimento { background:rgba(26,95,180,.15); color:#3498db; }
        .tag-aguardando { background:rgba(155,89,182,.15); color:#9b59b6; }
        .tag-resolvido  { background:rgba(46,194,126,.15); color:#2ec27e; }
        .tag-fechado    { background:rgba(139,148,158,.15); color:#8b949e; }
        .tag-urgente    { background:rgba(224,27,36,.15); color:#e01b24; }
        .tag-alta       { background:rgba(243,156,18,.15); color:#f39c12; }
        .tag-normal     { background:rgba(52,152,219,.15); color:#3498db; }
        .tag-baixa      { background:rgba(139,148,158,.15); color:#8b949e; }
        .tag-sla-ok     { background:rgba(46,194,126,.1); color:#2ec27e; }
        .tag-sla-warn   { background:rgba(243,156,18,.1); color:#f39c12; }
        .tag-sla-late   { background:rgba(224,27,36,.1); color:#e01b24; }
        .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:200px; color:var(--cor-texto-sec); gap:12px; }
        .empty-state i { font-size:40px; opacity:.3; }
        .painel-detalhe { display:flex; flex-direction:column; background:var(--cor-fundo); }
        .detalhe-vazio { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; color:var(--cor-texto-sec); gap:16px; }
        .detalhe-vazio i { font-size:60px; opacity:.2; }
        .detalhe-header { background:var(--cor-card); border-bottom:1px solid var(--cor-borda); padding:16px 24px; }
        .detalhe-header-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
        .detalhe-titulo-wrap h2 { font-size:18px; margin-bottom:4px; }
        .detalhe-titulo-wrap small { color:var(--cor-texto-sec); font-size:12px; }
        .detalhe-meta { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
        .meta-item { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--cor-texto-sec); }
        .controles-admin { background:rgba(26,95,180,.05); border-bottom:1px solid var(--cor-borda); padding:12px 24px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
        .controles-admin select { background:var(--cor-card) !important; border:1px solid var(--cor-borda) !important; color:var(--cor-texto) !important; padding:7px 12px !important; border-radius:var(--radius-sm) !important; font-size:13px !important; min-height:unset !important; cursor:pointer; }
        .btn-sm { padding:7px 14px; border-radius:var(--radius-sm); font-size:13px; cursor:pointer; border:none; display:flex; align-items:center; gap:6px; transition:all .2s; font-weight:500; }
        .btn-primary { background:var(--cor-primaria); color:#fff; }
        .btn-primary:hover { background:#1557a8; }
        .btn-ghost { background:transparent; border:1px solid var(--cor-borda); color:var(--cor-texto); }
        .btn-ghost:hover { border-color:var(--cor-primaria); color:var(--cor-primaria); }
        .chat-area { flex:1; overflow-y:auto; padding:20px 24px; display:flex; flex-direction:column; gap:12px; }
        .msg-wrapper { display:flex; flex-direction:column; max-width:70%; gap:4px; }
        .msg-wrapper.cliente { align-self:flex-start; }
        .msg-wrapper.admin   { align-self:flex-end; }
        .msg-wrapper.nota    { align-self:center; max-width:85%; }
        .msg-bubble { padding:10px 14px; border-radius:12px; font-size:14px; line-height:1.5; word-break:break-word; }
        .msg-wrapper.cliente .msg-bubble { background:rgba(26,95,180,.12); border:1px solid rgba(26,95,180,.2); border-radius:12px 12px 12px 2px; }
        .msg-wrapper.admin .msg-bubble { background:rgba(46,194,126,.12); border:1px solid rgba(46,194,126,.2); border-radius:12px 12px 2px 12px; }
        .msg-wrapper.nota .msg-bubble { background:rgba(243,156,18,.08); border:1px dashed rgba(243,156,18,.3); border-radius:8px; font-size:13px; font-style:italic; }
        .msg-meta { font-size:11px; color:var(--cor-texto-sec); display:flex; gap:8px; }
        .msg-wrapper.admin .msg-meta { justify-content:flex-end; }
        .nota-label { font-size:10px; color:var(--cor-alerta); font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
        .input-area { border-top:1px solid var(--cor-borda); padding:16px 24px; background:var(--cor-card); display:flex; flex-direction:column; gap:10px; }
        .input-row { display:flex; gap:10px; align-items:flex-end; }
        .msg-textarea { flex:1; background:var(--cor-fundo) !important; border:1px solid var(--cor-borda) !important; color:var(--cor-texto) !important; border-radius:var(--radius-sm) !important; padding:10px 14px !important; font-size:14px !important; resize:none !important; min-height:60px !important; max-height:120px; line-height:1.5; }
        .msg-textarea:focus { border-color:var(--cor-primaria) !important; outline:none !important; box-shadow:none !important; }
        .input-opts { display:flex; align-items:center; gap:10px; }
        .checkbox-nota { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--cor-alerta); cursor:pointer; }
        .checkbox-nota input[type=checkbox] { width:16px !important; height:16px !important; min-height:unset !important; padding:0 !important; border-radius:4px !important; cursor:pointer; accent-color:var(--cor-alerta); }
        .loading-msg { display:flex; align-items:center; justify-content:center; height:100%; gap:10px; color:var(--cor-texto-sec); }
        .stats-row { display:flex; gap:16px; padding:16px 24px; background:var(--cor-fundo); border-bottom:1px solid var(--cor-borda); flex-wrap:wrap; }
        .stat-pill { display:flex; flex-direction:column; align-items:center; gap:2px; background:var(--cor-card); border:1px solid var(--cor-borda); border-radius:var(--radius-sm); padding:10px 20px; min-width:100px; }
        .stat-pill .val { font-size:22px; font-weight:700; }
        .stat-pill .lbl { font-size:11px; color:var(--cor-texto-sec); text-transform:uppercase; letter-spacing:.5px; }
        .val-aberto { color:var(--cor-alerta); }
        .val-atendimento { color:#3498db; }
        .val-resolvido { color:var(--cor-sucesso); }
        .val-fechado { color:var(--cor-texto-sec); }

        .lang-switch { display:flex; gap:6px; align-items:center; }
        .lang-btn {
            background:transparent; border:1px solid var(--cor-borda); color:var(--cor-texto-sec);
            padding:6px 12px; border-radius:6px; font-size:12px; font-weight:600;
            text-decoration:none; transition:all .2s; display:inline-flex; align-items:center; height:32px;
        }
        .lang-btn:hover { border-color:var(--cor-primaria); color:var(--cor-primaria); }
        .lang-btn.active { background:var(--cor-primaria); border-color:var(--cor-primaria); color:#fff; }
        #btnTheme {
            background:transparent; border:1px solid var(--cor-borda); color:var(--cor-texto-sec);
            padding:6px 12px; border-radius:6px; cursor:pointer; font-size:14px;
            transition:all .2s; display:inline-flex; align-items:center; height:32px;
        }
        #btnTheme:hover { border-color:var(--cor-primaria); color:var(--cor-primaria); }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <a href="/admin/dashboard" class="btn-back"><i class="fas fa-arrow-left"></i> Dashboard</a>
        <h1><i class="fas fa-headset"></i> B2B Support Tickets</h1>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
        <a href="/language/{{ 'pt' if current_lang == 'en' else 'en' }}" class="btn-hd btn-hd-ghost"><i class="fas fa-globe"></i> {{ 'PT' if current_lang == 'en' else 'EN' }}</a>
        <button id="btnTheme" onclick="toggleTheme()" title="Toggle theme"><i class="fas fa-moon"></i></button>
    </div>
</div>

<div class="stats-row">
    <div class="stat-pill"><span class="val val-aberto" id="stAberto">--</span><span class="lbl">Open</span></div>
    <div class="stat-pill"><span class="val val-atendimento" id="stAtend">--</span><span class="lbl">In progress</span></div>
    <div class="stat-pill"><span class="val" style="color:#9b59b6" id="stAguard">--</span><span class="lbl">Awaiting client</span></div>
    <div class="stat-pill"><span class="val val-resolvido" id="stResol">--</span><span class="lbl">Resolved</span></div>
    <div class="stat-pill"><span class="val val-fechado" id="stFech">--</span><span class="lbl">Closed</span></div>
</div>

<div class="filtros-bar">
    <select id="filtroStatus" onchange="aplicarFiltros()">
        <option value="">All statuses</option>
        <option value="aberto">Open</option>
        <option value="em_atendimento">In progress</option>
        <option value="aguardando_cliente">Awaiting client</option>
        <option value="resolvido">Resolved</option>
        <option value="fechado">Closed</option>
    </select>
    <select id="filtroPrioridade" onchange="aplicarFiltros()">
        <option value="">All priorities</option>
        <option value="urgente">Urgent</option>
        <option value="alta">High</option>
        <option value="normal">Normal</option>
        <option value="baixa">Low</option>
    </select>
    <input type="text" id="filtroCliente" placeholder="Search client..." oninput="aplicarFiltros()">
    <span class="badge-count" id="totalCount">0 tickets</span>
</div>

<div class="main-layout">
    <div class="lista-chamados" id="listaChamados">
        <div class="empty-state"><i class="fas fa-spinner fa-spin"></i><span>Loading...</span></div>
    </div>
    <div class="painel-detalhe" id="painelDetalhe">
        <div class="detalhe-vazio" id="detalheVazio">
            <i class="fas fa-comments"></i>
            <p>Select a ticket to view</p>
        </div>
        <div id="detalheConteudo" style="display:none;flex-direction:column;flex:1;overflow:hidden">
            <div class="detalhe-header">
                <div class="detalhe-header-top">
                    <div class="detalhe-titulo-wrap">
                        <h2 id="detTitulo"></h2>
                        <small id="detId"></small>
                    </div>
                </div>
                <div class="detalhe-meta" id="detMeta"></div>
            </div>
            <div class="controles-admin">
                <label style="font-size:13px;color:var(--cor-texto-sec)">Status:</label>
                <select id="selectStatus" onchange="mudarStatus()">
                    <option value="aberto">Open</option>
                    <option value="em_atendimento">In progress</option>
                    <option value="aguardando_cliente">Awaiting client</option>
                    <option value="resolvido">Resolved</option>
                    <option value="fechado">Closed</option>
                </select>
                <label style="font-size:13px;color:var(--cor-texto-sec)">Assign:</label>
                <input type="text" id="inputAtribuir" placeholder="Operator username"
                    style="background:var(--cor-card)!important;border:1px solid var(--cor-borda)!important;color:var(--cor-texto)!important;padding:7px 12px!important;border-radius:var(--radius-sm)!important;font-size:13px!important;min-height:unset!important;width:160px">
                <button class="btn-sm btn-ghost" onclick="atribuirChamado()"><i class="fas fa-user-tag"></i> Assign</button>
            </div>
            <div class="chat-area" id="chatArea">
                <div class="loading-msg"><i class="fas fa-spinner fa-spin"></i> Loading messages...</div>
            </div>
            <div class="input-area">
                <div class="input-opts">
                    <label class="checkbox-nota">
                        <input type="checkbox" id="checkNota"> <i class="fas fa-lock"></i> Internal note (hidden from client)
                    </label>
                </div>
                <div class="input-row">
                    <textarea class="msg-textarea" id="msgInput" placeholder="Type your reply..." rows="2"
                        onkeydown="if(event.key==='Enter'&&event.ctrlKey)enviarMensagem()"></textarea>
                    <button class="btn-sm btn-primary" onclick="enviarMensagem()">
                        <i class="fas fa-paper-plane"></i> Send
                    </button>
                </div>
                <small style="color:var(--cor-texto-sec);font-size:11px">Ctrl+Enter to send</small>
            </div>
        </div>
    </div>
</div>

<script>
let todosOsChamados = [];
let chamadoAtual = null;

const STATUS_LABEL = {
    aberto:'Open', em_atendimento:'In progress',
    aguardando_cliente:'Awaiting client', resolvido:'Resolved', fechado:'Closed'
};
const STATUS_TAG = {
    aberto:'tag-aberto', em_atendimento:'tag-atendimento',
    aguardando_cliente:'tag-aguardando', resolvido:'tag-resolvido', fechado:'tag-fechado'
};
const PRIO_TAG = { urgente:'tag-urgente', alta:'tag-alta', normal:'tag-normal', baixa:'tag-baixa' };
const PRIO_LABEL = { urgente:'Urgent', alta:'High', normal:'Normal', baixa:'Low' };
const CAT_LABEL = {
    transferencia:'Transfer', cambio:'Exchange', documentacao:'Documentation',
    financeiro:'Financial', tecnico:'Technical', outro:'Other'
};

function fmtData(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('en-GB') + ' ' + d.toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});
}

function slaTag(deadline, status) {
    if (!deadline || ['resolvido','fechado'].includes(status)) return '';
    const diff = new Date(deadline) - new Date();
    const horas = diff / 3600000;
    if (horas < 0) return `<span class="tag tag-sla-late"><i class="fas fa-exclamation-triangle"></i> SLA overdue</span>`;
    if (horas < 4) return `<span class="tag tag-sla-warn"><i class="fas fa-clock"></i> SLA ${Math.round(horas)}h left</span>`;
    return `<span class="tag tag-sla-ok"><i class="fas fa-check-circle"></i> SLA ok</span>`;
}

async function carregarChamados() {
    const status = document.getElementById('filtroStatus').value;
    const prioridade = document.getElementById('filtroPrioridade').value;
    const cliente = document.getElementById('filtroCliente').value;
    let url = '/api/chamados/lista?';
    if (status) url += `status=${status}&`;
    if (prioridade) url += `prioridade=${prioridade}&`;
    if (cliente) url += `cliente=${encodeURIComponent(cliente)}&`;
    try {
        const r = await fetch(url);
        const d = await r.json();
        if (d.success) {
            todosOsChamados = d.chamados || [];
            renderLista(todosOsChamados);
            calcStats(todosOsChamados);
        }
    } catch(e) { console.error(e); }
}

function aplicarFiltros() { carregarChamados(); }

function calcStats(lista) {
    const cnt = s => lista.filter(c => c.status === s).length;
    document.getElementById('stAberto').textContent = cnt('aberto');
    document.getElementById('stAtend').textContent = cnt('em_atendimento');
    document.getElementById('stAguard').textContent = cnt('aguardando_cliente');
    document.getElementById('stResol').textContent = cnt('resolvido');
    document.getElementById('stFech').textContent = cnt('fechado');
    document.getElementById('totalCount').textContent = lista.length + ' ticket(s)';
}

function renderLista(lista) {
    const el = document.getElementById('listaChamados');
    if (!lista.length) {
        el.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><span>No tickets found</span></div>';
        return;
    }
    el.innerHTML = lista.map(c => {
        const ativo = chamadoAtual && chamadoAtual.id === c.id ? 'ativo' : '';
        return `
        <div class="chamado-item ${ativo}" onclick="abrirChamado('${c.id}')">
            <div class="chamado-item-header">
                <span class="chamado-id">${c.id}</span>
                <span class="chamado-data">${fmtData(c.updated_at)}</span>
            </div>
            <div class="chamado-titulo">${c.titulo}</div>
            <div class="chamado-cliente"><i class="fas fa-building" style="font-size:11px"></i> ${c.cliente_nome || c.cliente_username}</div>
            <div class="chamado-meta">
                <span class="tag ${STATUS_TAG[c.status]}">${STATUS_LABEL[c.status]}</span>
                <span class="tag ${PRIO_TAG[c.prioridade]}">${PRIO_LABEL[c.prioridade] || c.prioridade}</span>
                ${c.atribuido_a ? `<span class="tag" style="background:rgba(52,152,219,.1);color:#3498db"><i class="fas fa-user" style="font-size:10px"></i> ${c.atribuido_a}</span>` : ''}
                ${slaTag(c.sla_deadline, c.status)}
            </div>
        </div>`;
    }).join('');
}

async function abrirChamado(id) {
    chamadoAtual = todosOsChamados.find(c => c.id === id);
    renderLista(todosOsChamados);
    document.getElementById('detalheVazio').style.display = 'none';
    const cont = document.getElementById('detalheConteudo');
    cont.style.display = 'flex';
    const chat = document.getElementById('chatArea');
    chat.innerHTML = '<div class="loading-msg"><i class="fas fa-spinner fa-spin"></i> Loading...</div>';
    document.getElementById('detTitulo').textContent = chamadoAtual.titulo;
    document.getElementById('detId').textContent = chamadoAtual.id + ' • ' + (chamadoAtual.cliente_nome || chamadoAtual.cliente_username);
    document.getElementById('selectStatus').value = chamadoAtual.status;
    document.getElementById('inputAtribuir').value = chamadoAtual.atribuido_a || '';
    renderDetMeta(chamadoAtual);
    const r = await fetch(`/api/chamados/${id}`);
    const d = await r.json();
    if (d.success) { chamadoAtual = d.chamado; renderMensagens(d.mensagens); }
}

function renderDetMeta(c) {
    document.getElementById('detMeta').innerHTML = `
        <div class="meta-item"><i class="fas fa-tag"></i> ${CAT_LABEL[c.categoria] || c.categoria}</div>
        <div class="meta-item"><i class="fas fa-flag"></i>
            <span class="tag ${PRIO_TAG[c.prioridade]}">${PRIO_LABEL[c.prioridade] || c.prioridade}</span></div>
        <div class="meta-item"><i class="fas fa-circle-notch"></i>
            <span class="tag ${STATUS_TAG[c.status]}">${STATUS_LABEL[c.status]}</span></div>
        <div class="meta-item"><i class="fas fa-calendar-plus"></i> ${fmtData(c.created_at)}</div>
        ${c.atribuido_a ? `<div class="meta-item"><i class="fas fa-user-tag"></i> ${c.atribuido_a}</div>` : ''}
        ${slaTag(c.sla_deadline, c.status)}
    `;
}

function renderMensagens(msgs) {
    const chat = document.getElementById('chatArea');
    if (!msgs.length) {
        chat.innerHTML = '<div class="empty-state"><i class="fas fa-comment-slash"></i><span>No messages</span></div>';
        return;
    }
    chat.innerHTML = msgs.map(m => {
        const tipo = m.is_nota_interna ? 'nota' : m.autor_tipo;
        const nota = m.is_nota_interna ? `<span class="nota-label"><i class="fas fa-lock"></i> internal note</span>` : '';
        return `
        <div class="msg-wrapper ${tipo}">
            ${m.is_nota_interna ? nota : ''}
            <div class="msg-bubble">${m.mensagem.replace(/\n/g,'<br>')}</div>
            <div class="msg-meta">
                <span>${m.autor_nome}</span>
                <span>${fmtData(m.created_at)}</span>
            </div>
        </div>`;
    }).join('');
    chat.scrollTop = chat.scrollHeight;
}

async function enviarMensagem() {
    if (!chamadoAtual) return;
    const texto = document.getElementById('msgInput').value.trim();
    if (!texto) return;
    const nota = document.getElementById('checkNota').checked;
    const r = await fetch(`/api/chamados/${chamadoAtual.id}/mensagem`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({mensagem: texto, nota_interna: nota})
    });
    const d = await r.json();
    if (d.success) {
        document.getElementById('msgInput').value = '';
        document.getElementById('checkNota').checked = false;
        abrirChamado(chamadoAtual.id);
        carregarChamados();
    } else { alert('Error: ' + d.error); }
}

async function mudarStatus() {
    if (!chamadoAtual) return;
    const novo = document.getElementById('selectStatus').value;
    const r = await fetch(`/api/chamados/${chamadoAtual.id}/status`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({status: novo})
    });
    const d = await r.json();
    if (d.success) { chamadoAtual.status = novo; renderDetMeta(chamadoAtual); carregarChamados(); }
}

async function atribuirChamado() {
    if (!chamadoAtual) return;
    const val = document.getElementById('inputAtribuir').value.trim();
    const r = await fetch(`/api/chamados/${chamadoAtual.id}/atribuir`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({atribuido_a: val})
    });
    const d = await r.json();
    if (d.success) { chamadoAtual.atribuido_a = val || null; renderDetMeta(chamadoAtual); carregarChamados(); }
}

document.addEventListener('DOMContentLoaded', () => {
    carregarChamados();
    setInterval(carregarChamados, 30000);
});
</script>
<script src="/static/js/theme.js"></script>
</body>
