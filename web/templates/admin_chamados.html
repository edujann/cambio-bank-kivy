<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <script>(function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('theme')||'light'); })();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link International — Chamados B2B</title>
    <link rel="stylesheet" href="/static/css/theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root, :root[data-theme="dark"]{--cor-fundo:#110f08;--cor-card:#1e1b12;--cor-borda:#2d2819;--cor-texto:#f0e8d0;--cor-texto-sec:#9e9070;--cor-texto-secundario:#9e9070;--cor-primaria:#d29e00;--cor-admin:#d29e00;--cor-sucesso:#2ec27e;--cor-alerta:#f39c12;--cor-perigo:#e01b24;--sombra-suave:0 4px 6px rgba(0,0,0,.30);--radius:14px;--radius-sm:10px;}
        :root[data-theme="light"]{--cor-fundo:#f5ede0;--cor-card:#ffffff;--cor-borda:rgba(210,185,130,.4);--cor-texto:#1a1200;--cor-texto-sec:#9a8560;--cor-texto-secundario:#9a8560;--cor-primaria:#c8920a;--cor-admin:#c8920a;--cor-sucesso:#1a7a52;--cor-alerta:#b87200;--cor-perigo:#c02020;--sombra-suave:0 2px 8px rgba(160,110,0,.10),0 1px 3px rgba(0,0,0,.04);--radius:14px;--radius-sm:10px;}
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
        body { background-color:#110f08;background-image:linear-gradient(135deg,#110f08 0%,#1f1a10 100%); color:var(--cor-texto); height:100vh; overflow:hidden; display:flex; flex-direction:column; }
        html[data-theme="light"] body{background-color:#f5ede0;background-image:radial-gradient(ellipse at 15% 15%,rgba(210,158,0,.10) 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(180,120,0,.08) 0%,transparent 55%),linear-gradient(150deg,#f8f2e6 0%,#fdf9f2 45%,#ede3cf 100%);}

        /* HEADER */
        .header { flex-shrink:0; max-width:1400px; margin:0 auto; width:100%; padding:20px 24px; display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; border-bottom:1px solid var(--cor-borda); }
        .logo { display:flex; align-items:center; gap:10px; font-size:17px; }
        .logo-text { background:linear-gradient(90deg,#b78700,#eeb600); -webkit-background-clip:text; background-clip:text; color:transparent; font-weight:800; }
        .logo-text span { font-weight:400; }
        .badge-admin { background:var(--cor-admin); color:#fff; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:bold; margin-left:10px; }
        .page-title { font-size:20px; font-weight:bold; flex:1; text-align:center; background:linear-gradient(90deg,#b78700,#eeb600); -webkit-background-clip:text; background-clip:text; color:transparent; }
        .hd-right { display:flex; align-items:center; gap:8px; }
        .btn-hd { background:rgba(210,158,0,.12); border:1px solid var(--cor-admin); color:var(--cor-admin); padding:5px 12px; border-radius:6px; cursor:pointer; font-size:12px; font-weight:600; text-decoration:none; display:inline-flex; align-items:center; gap:6px; white-space:nowrap; transition:.15s; }
        .btn-hd:hover { background:rgba(210,158,0,.25); }
        .btn-hd-ghost { background:transparent; border:1px solid var(--cor-borda); color:var(--cor-texto-sec); }
        .btn-hd-ghost:hover { border-color:var(--cor-admin); color:var(--cor-admin); }
        #btnTheme { background:transparent; border:1px solid var(--cor-borda); color:var(--cor-texto-sec); padding:0; border-radius:6px; cursor:pointer; font-size:14px; display:inline-flex; align-items:center; justify-content:center; height:30px; width:30px; transition:.15s; }
        #btnTheme:hover { border-color:var(--cor-admin); color:var(--cor-admin); }

        /* FILTROS */
        .filtros-bar {
            flex-shrink:0; max-width:1400px; margin:0 auto; width:100%;
            background:var(--cor-card); border-bottom:1px solid var(--cor-borda);
            padding:10px 24px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;
        }
        .filtros-bar select, .filtros-bar input {
            background:var(--cor-card) !important; border:1px solid var(--cor-borda) !important;
            color:var(--cor-texto) !important; padding:8px 12px !important;
            border-radius:var(--radius-sm) !important; font-size:13px !important;
            min-height:unset !important; min-width:150px;
        }
        .filtros-bar select:focus, .filtros-bar input:focus {
            border-color:var(--cor-primaria) !important; outline:none !important;
            box-shadow:none !important;
        }
        .badge-count {
            background:rgba(210,158,0,.15); color:var(--cor-admin);
            padding:4px 12px; border-radius:20px; font-size:13px; font-weight:600;
            margin-left:auto;
        }

        /* LAYOUT PRINCIPAL */
        .main-layout {
            max-width:1400px; margin:0 auto; width:100%;
            display:grid; grid-template-columns:400px 1fr;
            flex:1; min-height:0;
        }

        /* LISTA DE CHAMADOS */
        .lista-chamados {
            border-right:1px solid var(--cor-borda); overflow-y:auto; background:var(--cor-fundo);
        }
        .chamado-item {
            padding:16px 20px; border-bottom:1px solid var(--cor-borda); cursor:pointer;
            transition:background .2s; position:relative;
        }
        .chamado-item:hover { background:rgba(210,158,0,.07); }
        .chamado-item.ativo { background:rgba(210,158,0,.12); border-left:3px solid var(--cor-admin); }
        .chamado-item-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; }
        .chamado-id { font-size:11px; color:var(--cor-texto-sec); font-family:monospace; }
        .chamado-data { font-size:11px; color:var(--cor-texto-sec); white-space:nowrap; }
        .chamado-titulo { font-size:14px; font-weight:600; margin-bottom:4px; color:var(--cor-texto); }
        .chamado-cliente { font-size:12px; color:var(--cor-primaria); margin-bottom:8px; }
        .chamado-meta { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
        .dot-nao-lido {
            width:7px; height:7px; background:var(--cor-primaria); border-radius:50%;
            display:inline-block; vertical-align:middle; margin-left:5px; flex-shrink:0;
            animation:pulse-dot 1.5s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,100% { opacity:1; transform:scale(1); }
            50%      { opacity:.55; transform:scale(.8); }
        }
        #btnRefresh { transition:transform .3s; }
        #btnRefresh.spinning i { animation:spin-once .5s linear; }
        @keyframes spin-once { to { transform:rotate(360deg); } }

        /* TAGS STATUS / PRIORIDADE / CATEGORIA */
        .tag {
            font-size:11px; padding:2px 8px; border-radius:10px;
            font-weight:600; display:inline-block; white-space:nowrap;
        }
        .tag-aberto    { background:rgba(243,156,18,.15); color:#f39c12; }
        .tag-atendimento { background:rgba(52,152,219,.15); color:#3498db; }
        .tag-aguardando { background:rgba(155,89,182,.15); color:#9b59b6; }
        .tag-resolvido  { background:rgba(46,194,126,.15); color:#2ec27e; }
        .tag-fechado    { background:rgba(139,148,158,.15); color:#8b949e; }
        .tag-urgente    { background:rgba(224,27,36,.15); color:#e01b24; }
        .tag-alta       { background:rgba(243,156,18,.15); color:#f39c12; }
        .tag-normal     { background:rgba(52,152,219,.15); color:#3498db; }
        .tag-baixa      { background:rgba(139,148,158,.15); color:#8b949e; }
        .tag-sla-ok     { background:rgba(46,194,126,.1); color:#2ec27e; }
        .tag-sla-warn   { background:rgba(243,156,18,.1); color:#f39c12; }
        .tag-sla-late   { background:rgba(224,27,36,.1); color:#e01b24; }
        .tag-cat-transferencia { background:rgba(52,152,219,.12); color:#3498db; }
        .tag-cat-cambio        { background:rgba(210,158,0,.12); color:var(--cor-admin); }
        .tag-cat-documentacao  { background:rgba(155,89,182,.12); color:#9b59b6; }
        .tag-cat-financeiro    { background:rgba(46,194,126,.12); color:#2ec27e; }
        .tag-cat-tecnico       { background:rgba(243,156,18,.12); color:#f39c12; }
        .tag-cat-outro         { background:rgba(139,148,158,.12); color:#8b949e; }

        .empty-state {
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            height:200px; color:var(--cor-texto-sec); gap:12px;
        }
        .empty-state i { font-size:40px; opacity:.3; }

        /* PAINEL DETALHE */
        .painel-detalhe {
            display:flex; flex-direction:column; background:var(--cor-fundo);
        }
        .detalhe-vazio {
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            flex:1; color:var(--cor-texto-sec); gap:16px;
        }
        .detalhe-vazio i { font-size:60px; opacity:.2; }

        /* DETALHE HEADER */
        .detalhe-header {
            background:var(--cor-card); border-bottom:1px solid var(--cor-borda);
            padding:16px 24px;
        }
        .detalhe-header-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
        .detalhe-titulo-wrap h2 { font-size:18px; margin-bottom:4px; }
        .detalhe-titulo-wrap small { color:var(--cor-texto-sec); font-size:12px; }
        .detalhe-acoes { display:flex; gap:8px; flex-wrap:wrap; }
        .detalhe-meta { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
        .meta-item { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--cor-texto-sec); }
        .meta-item i { width:14px; }

        /* CONTROLES ADMIN */
        .controles-admin {
            background:rgba(210,158,0,.05); border-bottom:1px solid var(--cor-borda);
            padding:12px 24px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;
        }
        .controles-admin select {
            background:var(--cor-card) !important; border:1px solid var(--cor-borda) !important;
            color:var(--cor-texto) !important; padding:7px 12px !important;
            border-radius:var(--radius-sm) !important; font-size:13px !important;
            min-height:unset !important; cursor:pointer;
        }
        .btn-sm {
            padding:7px 14px; border-radius:var(--radius-sm); font-size:13px;
            cursor:pointer; border:none; display:flex; align-items:center; gap:6px;
            transition:all .2s; font-weight:500;
        }
        .btn-primary { background:var(--cor-admin); color:#1a1200; }
        .btn-primary:hover { background:#eeb600; }
        .btn-success { background:var(--cor-sucesso); color:#fff; }
        .btn-success:hover { background:#28a870; }
        .btn-warn { background:var(--cor-alerta); color:#fff; }
        .btn-warn:hover { background:#e08e0b; }
        .btn-danger { background:var(--cor-perigo); color:#fff; }
        .btn-danger:hover { background:#c4161d; }
        .btn-ghost { background:transparent; border:1px solid var(--cor-borda); color:var(--cor-texto); }
        .btn-ghost:hover { border-color:var(--cor-primaria); color:var(--cor-primaria); }

        /* CHAT */
        .chat-area {
            flex:1; overflow-y:auto; padding:20px 24px;
            display:flex; flex-direction:column; gap:12px;
        }
        .msg-wrapper { display:flex; flex-direction:column; max-width:70%; gap:4px; }
        .msg-wrapper.cliente { align-self:flex-start; }
        .msg-wrapper.admin   { align-self:flex-end; }
        .msg-wrapper.nota    { align-self:center; max-width:85%; }
        .msg-bubble {
            padding:10px 14px; border-radius:12px; font-size:14px; line-height:1.5;
            word-break:break-word;
        }
        .msg-wrapper.cliente .msg-bubble {
            background:rgba(210,158,0,.10); border:1px solid rgba(210,158,0,.2);
            border-radius:12px 12px 12px 2px;
        }
        .msg-wrapper.admin .msg-bubble {
            background:rgba(46,194,126,.12); border:1px solid rgba(46,194,126,.2);
            border-radius:12px 12px 2px 12px;
        }
        .msg-wrapper.nota .msg-bubble {
            background:rgba(243,156,18,.08); border:1px dashed rgba(243,156,18,.3);
            border-radius:8px; font-size:13px; font-style:italic;
        }
        .msg-meta { font-size:11px; color:var(--cor-texto-sec); display:flex; gap:8px; }
        .msg-wrapper.admin .msg-meta { justify-content:flex-end; }
        .nota-label { font-size:10px; color:var(--cor-alerta); font-weight:600; text-transform:uppercase; letter-spacing:.5px; }

        /* INPUT MENSAGEM */
        .input-area {
            border-top:1px solid var(--cor-borda); padding:16px 24px;
            background:var(--cor-card); display:flex; flex-direction:column; gap:10px;
        }
        .input-row { display:flex; gap:10px; align-items:flex-end; }
        .msg-textarea {
            flex:1; background:var(--cor-fundo) !important; border:1px solid var(--cor-borda) !important;
            color:var(--cor-texto) !important; border-radius:var(--radius-sm) !important;
            padding:10px 14px !important; font-size:14px !important; resize:none !important;
            min-height:60px !important; max-height:120px; line-height:1.5;
        }
        .msg-textarea:focus { border-color:var(--cor-primaria) !important; outline:none !important; box-shadow:none !important; }
        .input-opts { display:flex; align-items:center; gap:10px; }
        .checkbox-nota { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--cor-alerta); cursor:pointer; }
        .checkbox-nota input[type=checkbox] {
            width:16px !important; height:16px !important; min-height:unset !important;
            padding:0 !important; border-radius:4px !important; cursor:pointer; accent-color:var(--cor-alerta);
        }

        /* LOADING */
        .loading-msg { display:flex; align-items:center; justify-content:center; height:100%; gap:10px; color:var(--cor-texto-sec); }

        /* STATS TOP */
        .stats-row {
            flex-shrink:0; max-width:1400px; margin:0 auto; width:100%;
            display:flex; gap:16px; padding:12px 24px; background:var(--cor-fundo);
            border-bottom:1px solid var(--cor-borda); flex-wrap:wrap;
        }
        .stat-pill {
            display:flex; flex-direction:column; align-items:center; gap:2px;
            background:var(--cor-card); border:1px solid var(--cor-borda); border-radius:var(--radius-sm);
            padding:10px 20px; min-width:100px;
        }
        .stat-pill .val { font-size:22px; font-weight:700; }
        .stat-pill .lbl { font-size:11px; color:var(--cor-texto-sec); text-transform:uppercase; letter-spacing:.5px; }
        .val-aberto { color:var(--cor-alerta); }
        .val-atendimento { color:#3498db; }
        .val-resolvido { color:var(--cor-sucesso); }
        .val-fechado { color:var(--cor-texto-sec); }

        .lang-switch { display:flex; gap:6px; align-items:center; }
        .lang-btn {
            background:transparent; border:1px solid var(--cor-borda); color:var(--cor-texto-sec);
            padding:6px 12px; border-radius:6px; font-size:12px; font-weight:600;
            text-decoration:none; transition:all .2s; display:inline-flex;
            align-items:center; height:32px;
        }
        .lang-btn:hover { border-color:var(--cor-admin); color:var(--cor-admin); }
        .lang-btn.active { background:var(--cor-admin); border-color:var(--cor-admin); color:#1a1200; }

        @media(max-width:900px) {
            .main-layout { grid-template-columns:1fr; }
            .painel-detalhe { display:none; }
            .painel-detalhe.show { display:flex; position:fixed; inset:0; z-index:100; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">
        <span class="logo-text"><strong>Link</strong><span> international</span></span>
        <span class="badge-admin">ADMIN</span>
    </div>
    <h1 class="page-title">Chamados B2B</h1>
    <div class="hd-right">
        <a href="/language/{{ 'pt' if current_lang == 'en' else 'en' }}" class="btn-hd btn-hd-ghost"><i class="fas fa-globe"></i> {{ 'PT' if current_lang == 'en' else 'EN' }}</a>
        <button id="btnTheme" onclick="toggleTheme()" title="Alternar tema"><i class="fas fa-moon"></i></button>
        <a href="/admin/dashboard" class="btn-hd btn-hd-ghost"><i class="fas fa-arrow-left"></i> Dashboard</a>
    </div>
</div>

<div class="stats-row" id="statsRow">
    <div class="stat-pill"><span class="val val-aberto" id="stAberto">--</span><span class="lbl">Abertos</span></div>
    <div class="stat-pill"><span class="val val-atendimento" id="stAtend">--</span><span class="lbl">Em atendimento</span></div>
    <div class="stat-pill"><span class="val" style="color:#9b59b6" id="stAguard">--</span><span class="lbl">Aguardando cliente</span></div>
    <div class="stat-pill"><span class="val val-resolvido" id="stResol">--</span><span class="lbl">Resolvidos</span></div>
    <div class="stat-pill"><span class="val val-fechado" id="stFech">--</span><span class="lbl">Fechados</span></div>
</div>

<div class="filtros-bar">
    <select id="filtroStatus" onchange="aplicarFiltros()">
        <option value="">Todos os status</option>
        <option value="aberto">Aberto</option>
        <option value="em_atendimento">Em atendimento</option>
        <option value="aguardando_cliente">Aguardando cliente</option>
        <option value="resolvido">Resolvido</option>
        <option value="fechado">Fechado</option>
    </select>
    <select id="filtroPrioridade" onchange="aplicarFiltros()">
        <option value="">Todas as prioridades</option>
        <option value="urgente">Urgente</option>
        <option value="alta">Alta</option>
        <option value="normal">Normal</option>
        <option value="baixa">Baixa</option>
    </select>
    <input type="text" id="filtroCliente" placeholder="Buscar cliente..." oninput="aplicarFiltros()">
    <span class="badge-count" id="totalCount">0 chamados</span>
    <span id="lastUpdate" style="font-size:11px;color:var(--cor-texto-sec);display:flex;align-items:center;gap:5px;margin-left:auto;white-space:nowrap">
        <i class="fas fa-circle" style="font-size:6px;color:var(--cor-sucesso)"></i> ao vivo
    </span>
    <button id="btnRefresh" onclick="refreshManual()" class="btn-hd btn-hd-ghost" style="padding:5px 10px" title="Atualizar agora">
        <i class="fas fa-rotate-right"></i>
    </button>
</div>

<div class="main-layout">
    <!-- LISTA -->
    <div class="lista-chamados" id="listaChamados">
        <div class="empty-state"><i class="fas fa-spinner fa-spin"></i><span>Carregando...</span></div>
    </div>

    <!-- DETALHE -->
    <div class="painel-detalhe" id="painelDetalhe">
        <div class="detalhe-vazio" id="detalheVazio">
            <i class="fas fa-comments"></i>
            <p>Selecione um chamado para visualizar</p>
        </div>
        <div id="detalheConteudo" style="display:none;flex-direction:column;flex:1;overflow:hidden">
            <!-- Header do chamado -->
            <div class="detalhe-header">
                <div class="detalhe-header-top">
                    <div class="detalhe-titulo-wrap">
                        <h2 id="detTitulo"></h2>
                        <small id="detId"></small>
                    </div>
                    <div class="detalhe-acoes" id="detAcoes"></div>
                </div>
                <div class="detalhe-meta" id="detMeta"></div>
            </div>
            <!-- Controles admin -->
            <div class="controles-admin">
                <label style="font-size:13px;color:var(--cor-texto-sec)">Status:</label>
                <select id="selectStatus" onchange="mudarStatus()">
                    <option value="aberto">Aberto</option>
                    <option value="em_atendimento">Em atendimento</option>
                    <option value="aguardando_cliente">Aguardando cliente</option>
                    <option value="resolvido">Resolvido</option>
                    <option value="fechado">Fechado</option>
                </select>
                <label style="font-size:13px;color:var(--cor-texto-sec)">Atribuir:</label>
                <input type="text" id="inputAtribuir" placeholder="Username do operador"
                    style="background:var(--cor-card)!important;border:1px solid var(--cor-borda)!important;color:var(--cor-texto)!important;padding:7px 12px!important;border-radius:var(--radius-sm)!important;font-size:13px!important;min-height:unset!important;width:160px">
                <button class="btn-sm btn-ghost" onclick="atribuirChamado()"><i class="fas fa-user-tag"></i> Atribuir</button>
            </div>
            <!-- Chat -->
            <div class="chat-area" id="chatArea">
                <div class="loading-msg"><i class="fas fa-spinner fa-spin"></i> Carregando mensagens...</div>
            </div>
            <!-- Input -->
            <div class="input-area">
                <div class="input-opts">
                    <label class="checkbox-nota">
                        <input type="checkbox" id="checkNota"> <i class="fas fa-lock"></i> Nota interna (invisível ao cliente)
                    </label>
                </div>
                <div class="input-row">
                    <textarea class="msg-textarea" id="msgInput" placeholder="Digite sua resposta..." rows="2"
                        onkeydown="if(event.key==='Enter'&&event.ctrlKey)enviarMensagem()"></textarea>
                    <button class="btn-sm btn-primary" onclick="enviarMensagem()">
                        <i class="fas fa-paper-plane"></i> Enviar
                    </button>
                </div>
                <small style="color:var(--cor-texto-sec);font-size:11px">Ctrl+Enter para enviar</small>
            </div>
        </div>
    </div>
</div>

<script>
let todosOsChamados = [];
let chamadoAtual = null;
let _lastRefreshTime = Date.now();

const STATUS_LABEL = {
    aberto: 'Aberto', em_atendimento: 'Em atendimento',
    aguardando_cliente: 'Aguardando cliente', resolvido: 'Resolvido', fechado: 'Fechado'
};
const STATUS_TAG = {
    aberto: 'tag-aberto', em_atendimento: 'tag-atendimento',
    aguardando_cliente: 'tag-aguardando', resolvido: 'tag-resolvido', fechado: 'tag-fechado'
};
const PRIO_TAG = { urgente:'tag-urgente', alta:'tag-alta', normal:'tag-normal', baixa:'tag-baixa' };
const CAT_LABEL = {
    transferencia:'Transferência', cambio:'Câmbio', documentacao:'Documentação',
    financeiro:'Financeiro', tecnico:'Técnico', outro:'Outro'
};
const PRIO_LABEL = { urgente:'Urgente', alta:'Alta', normal:'Normal', baixa:'Baixa' };
const PRIO_ICON  = { urgente:'fa-fire', alta:'fa-arrow-up', normal:'fa-minus', baixa:'fa-arrow-down' };
const CAT_ICON   = {
    transferencia:'fa-exchange-alt', cambio:'fa-coins', documentacao:'fa-file-alt',
    financeiro:'fa-dollar-sign', tecnico:'fa-tools', outro:'fa-ellipsis-h'
};

function fmtData(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
}

function slaTag(deadline, status) {
    if (!deadline || ['resolvido','fechado'].includes(status)) return '';
    const diff = new Date(deadline) - new Date();
    const horas = diff / 3600000;
    if (horas < 0) return `<span class="tag tag-sla-late"><i class="fas fa-exclamation-triangle"></i> SLA vencido</span>`;
    if (horas < 4) return `<span class="tag tag-sla-warn"><i class="fas fa-clock"></i> SLA ${Math.round(horas)}h</span>`;
    return `<span class="tag tag-sla-ok"><i class="fas fa-check-circle"></i> SLA ok</span>`;
}

function tempoRelativo(iso) {
    if (!iso) return '';
    const diff = Date.now() - new Date(iso).getTime();
    const min = Math.floor(diff / 60000);
    if (min < 1) return 'agora';
    if (min < 60) return `há ${min}min`;
    const h = Math.floor(diff / 3600000);
    if (h < 24) return `há ${h}h`;
    const dias = Math.floor(diff / 86400000);
    if (dias < 7) return `há ${dias}d`;
    return fmtData(iso);
}

function atualizarTimestamps() {
    document.querySelectorAll('[data-ts]').forEach(el => {
        el.textContent = tempoRelativo(el.dataset.ts);
    });
}

let _audioCtx = null;
function notifySound() {
    try {
        if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = _audioCtx.createOscillator();
        const gain = _audioCtx.createGain();
        osc.connect(gain); gain.connect(_audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, _audioCtx.currentTime);
        osc.frequency.setValueAtTime(1100, _audioCtx.currentTime + 0.12);
        gain.gain.setValueAtTime(0.08, _audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, _audioCtx.currentTime + 0.4);
        osc.start(_audioCtx.currentTime);
        osc.stop(_audioCtx.currentTime + 0.4);
    } catch(e) {}
}

function getLastSeen(id) { return parseInt(localStorage.getItem('adminLastSeen_' + id) || '0'); }
function setLastSeen(id) { localStorage.setItem('adminLastSeen_' + id, Date.now()); }
function isUnread(c) { return new Date(c.updated_at).getTime() > getLastSeen(c.id); }

let _prevNotifCount = -1;
function checkNotificacoes(lista) {
    const atencao = lista.filter(c =>
        (c.status === 'aberto' || c.status === 'aguardando_cliente') && isUnread(c)
    ).length;
    const BASE = 'Link International — Chamados B2B';
    document.title = atencao > 0 ? `(${atencao}) ${BASE}` : BASE;
    if (_prevNotifCount >= 0 && atencao > _prevNotifCount) notifySound();
    _prevNotifCount = atencao;
}

function atualizarContadorRefresh() {
    const el = document.getElementById('lastUpdate');
    if (!el) return;
    const seg = Math.floor((Date.now() - _lastRefreshTime) / 1000);
    if (seg < 5) {
        el.innerHTML = `<i class="fas fa-circle" style="font-size:6px;color:var(--cor-sucesso)"></i> ao vivo`;
    } else {
        el.innerHTML = `<i class="fas fa-circle" style="font-size:6px;color:var(--cor-texto-sec)"></i> há ${seg}s`;
    }
}

function refreshManual() {
    const btn = document.getElementById('btnRefresh');
    btn.classList.add('spinning');
    btn.disabled = true;
    carregarChamados().finally(() => {
        setTimeout(() => { btn.classList.remove('spinning'); btn.disabled = false; }, 500);
    });
}

async function carregarChamados() {
    const status = document.getElementById('filtroStatus').value;
    const prioridade = document.getElementById('filtroPrioridade').value;
    const cliente = document.getElementById('filtroCliente').value;
    let url = '/api/chamados/lista?';
    if (status) url += `status=${status}&`;
    if (prioridade) url += `prioridade=${prioridade}&`;
    if (cliente) url += `cliente=${encodeURIComponent(cliente)}&`;
    try {
        const r = await fetch(url);
        const d = await r.json();
        if (d.success) {
            todosOsChamados = d.chamados || [];
            renderLista(todosOsChamados);
            calcStats(todosOsChamados);
            _lastRefreshTime = Date.now();
        }
    } catch(e) { console.error(e); }
}

function aplicarFiltros() { carregarChamados(); }

function calcStats(lista) {
    const cnt = s => lista.filter(c => c.status === s).length;
    document.getElementById('stAberto').textContent = cnt('aberto');
    document.getElementById('stAtend').textContent = cnt('em_atendimento');
    document.getElementById('stAguard').textContent = cnt('aguardando_cliente');
    document.getElementById('stResol').textContent = cnt('resolvido');
    document.getElementById('stFech').textContent = cnt('fechado');
    document.getElementById('totalCount').textContent = lista.length + ' chamado(s)';
    checkNotificacoes(lista);
}

function renderLista(lista) {
    const el = document.getElementById('listaChamados');
    if (!lista.length) {
        el.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><span>Nenhum chamado encontrado</span></div>';
        return;
    }
    el.innerHTML = lista.map(c => {
        const ativo = chamadoAtual && chamadoAtual.id === c.id ? 'ativo' : '';
        const naoLido = isUnread(c) && !ativo ? '<span class="dot-nao-lido"></span>' : '';
        return `
        <div class="chamado-item ${ativo}" onclick="abrirChamado('${c.id}')">
            <div class="chamado-item-header">
                <span class="chamado-id" style="display:flex;align-items:center;gap:0">${c.id}${naoLido}</span>
                <span class="chamado-data" data-ts="${c.updated_at}" title="${fmtData(c.updated_at)}">${tempoRelativo(c.updated_at)}</span>
            </div>
            <div class="chamado-titulo">${c.titulo}</div>
            <div class="chamado-cliente"><i class="fas fa-building" style="font-size:11px"></i> ${c.cliente_nome || c.cliente_username}</div>
            <div class="chamado-meta">
                <span class="tag ${STATUS_TAG[c.status]}">${STATUS_LABEL[c.status]}</span>
                <span class="tag ${PRIO_TAG[c.prioridade]}"><i class="fas ${PRIO_ICON[c.prioridade]}" style="font-size:9px"></i> ${PRIO_LABEL[c.prioridade]||c.prioridade}</span>
                <span class="tag tag-cat-${c.categoria}"><i class="fas ${CAT_ICON[c.categoria]||'fa-tag'}" style="font-size:9px"></i> ${CAT_LABEL[c.categoria]||c.categoria}</span>
                ${c.atribuido_a ? `<span class="tag" style="background:rgba(52,152,219,.1);color:#3498db"><i class="fas fa-user" style="font-size:10px"></i> ${c.atribuido_a}</span>` : ''}
                ${slaTag(c.sla_deadline, c.status)}
            </div>
        </div>`;
    }).join('');
}

async function abrirChamado(id) {
    chamadoAtual = todosOsChamados.find(c => c.id === id);
    setLastSeen(id);
    renderLista(todosOsChamados);
    document.getElementById('detalheVazio').style.display = 'none';
    const cont = document.getElementById('detalheConteudo');
    cont.style.display = 'flex';
    const chat = document.getElementById('chatArea');
    chat.innerHTML = '<div class="loading-msg"><i class="fas fa-spinner fa-spin"></i> Carregando...</div>';
    document.getElementById('detTitulo').textContent = chamadoAtual.titulo;
    document.getElementById('detId').textContent = chamadoAtual.id + ' • ' + (chamadoAtual.cliente_nome || chamadoAtual.cliente_username);
    document.getElementById('selectStatus').value = chamadoAtual.status;
    document.getElementById('inputAtribuir').value = chamadoAtual.atribuido_a || '';
    renderDetMeta(chamadoAtual);
    const r = await fetch(`/api/chamados/${id}`);
    const d = await r.json();
    if (d.success) {
        chamadoAtual = d.chamado;
        renderMensagens(d.mensagens);
    }
}

function renderDetMeta(c) {
    document.getElementById('detMeta').innerHTML = `
        <div class="meta-item"><i class="fas fa-tag"></i> ${CAT_LABEL[c.categoria] || c.categoria}</div>
        <div class="meta-item"><i class="fas fa-flag"></i>
            <span class="tag ${PRIO_TAG[c.prioridade]}">${c.prioridade}</span></div>
        <div class="meta-item"><i class="fas fa-circle-notch"></i>
            <span class="tag ${STATUS_TAG[c.status]}">${STATUS_LABEL[c.status]}</span></div>
        <div class="meta-item"><i class="fas fa-calendar-plus"></i> ${fmtData(c.created_at)}</div>
        ${c.atribuido_a ? `<div class="meta-item"><i class="fas fa-user-tag"></i> ${c.atribuido_a}</div>` : ''}
        ${slaTag(c.sla_deadline, c.status)}
    `;
}

function renderMensagens(msgs) {
    const chat = document.getElementById('chatArea');
    if (!msgs.length) {
        chat.innerHTML = '<div class="empty-state"><i class="fas fa-comment-slash"></i><span>Sem mensagens</span></div>';
        return;
    }
    chat.innerHTML = msgs.map(m => {
        const tipo = m.is_nota_interna ? 'nota' : m.autor_tipo;
        const nota = m.is_nota_interna ? `<span class="nota-label"><i class="fas fa-lock"></i> nota interna</span>` : '';
        return `
        <div class="msg-wrapper ${tipo}">
            ${m.is_nota_interna ? nota : ''}
            <div class="msg-bubble">${m.mensagem.replace(/\n/g,'<br>')}</div>
            <div class="msg-meta">
                <span>${m.autor_nome}</span>
                <span>${fmtData(m.created_at)}</span>
            </div>
        </div>`;
    }).join('');
    chat.scrollTop = chat.scrollHeight;
}

async function enviarMensagem() {
    if (!chamadoAtual) return;
    const texto = document.getElementById('msgInput').value.trim();
    if (!texto) return;
    const nota = document.getElementById('checkNota').checked;
    const r = await fetch(`/api/chamados/${chamadoAtual.id}/mensagem`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({mensagem: texto, nota_interna: nota})
    });
    const d = await r.json();
    if (d.success) {
        document.getElementById('msgInput').value = '';
        document.getElementById('checkNota').checked = false;
        setLastSeen(chamadoAtual.id);
        abrirChamado(chamadoAtual.id);
        carregarChamados();
    } else {
        alert('Erro: ' + d.error);
    }
}

async function mudarStatus() {
    if (!chamadoAtual) return;
    const novo = document.getElementById('selectStatus').value;
    const r = await fetch(`/api/chamados/${chamadoAtual.id}/status`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({status: novo})
    });
    const d = await r.json();
    if (d.success) {
        chamadoAtual.status = novo;
        renderDetMeta(chamadoAtual);
        carregarChamados();
    }
}

async function atribuirChamado() {
    if (!chamadoAtual) return;
    const val = document.getElementById('inputAtribuir').value.trim();
    const r = await fetch(`/api/chamados/${chamadoAtual.id}/atribuir`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({atribuido_a: val})
    });
    const d = await r.json();
    if (d.success) {
        chamadoAtual.atribuido_a = val || null;
        renderDetMeta(chamadoAtual);
        carregarChamados();
    }
}

document.addEventListener('DOMContentLoaded', () => {
    carregarChamados();
    setInterval(carregarChamados, 15000);
    setInterval(atualizarTimestamps, 60000);
    setInterval(atualizarContadorRefresh, 1000);
    window.addEventListener('focus', () => { atualizarTimestamps(); carregarChamados(); });
});
</script>
<script src="/static/js/theme.js"></script>
</body>
</html>
