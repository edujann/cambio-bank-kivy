<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <script>(function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('theme')||'light'); })();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link International — Store Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root[data-theme="light"]{--cor-fundo:#f5ede0;--cor-card:#ffffff;--cor-borda:rgba(210,185,130,.4);--cor-texto:#1a1200;--cor-texto-secundario:#9a8560;--cor-admin:#c8920a;--cor-sucesso:#1a7a52;--cor-perigo:#c02020;--sombra-suave:0 2px 8px rgba(160,110,0,.10),0 1px 3px rgba(0,0,0,.04);--borda-radius:14px;--borda-radius-pequeno:10px;}
        :root[data-theme="dark"]{--cor-fundo:#110f08;--cor-card:#191611;--cor-borda:#2d2819;--cor-texto:#e0e0e0;--cor-texto-secundario:#8b949e;--cor-admin:#d29e00;--cor-sucesso:#2ec27e;--cor-perigo:#e01b24;--sombra-suave:0 4px 6px rgba(0,0,0,.30);--borda-radius:14px;--borda-radius-pequeno:10px;}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}
        body{background-color:#f5ede0;background-image:radial-gradient(ellipse at 15% 15%,rgba(210,158,0,.10) 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(180,120,0,.08) 0%,transparent 55%),linear-gradient(150deg,#f8f2e6 0%,#fdf9f2 45%,#ede3cf 100%);background-attachment:fixed;color:var(--cor-texto);min-height:100vh;}
        body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(180,130,0,.055) 1px,transparent 1px);background-size:30px 30px;pointer-events:none;z-index:0;}
        html[data-theme="dark"] body{background-color:#110f08;background-image:linear-gradient(135deg,#110f08 0%,#1f1a10 100%);}
        html[data-theme="dark"] body::before{display:none;}

        .top-bar{max-width:1100px;margin:0 auto;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--cor-borda);}
        .page-title{font-size:20px;font-weight:bold;flex:1;text-align:center;background:linear-gradient(90deg,#b78700,#eeb600);-webkit-background-clip:text;background-clip:text;color:transparent;}
        .badge-admin{background:var(--cor-admin);color:#fff;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:bold;margin-left:10px;}
        .logo{display:flex;align-items:center;gap:10px;font-size:17px;}
        .logo-text{background:linear-gradient(90deg,#b78700,#eeb600);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:800;}
        .logo-text span{font-weight:400;}
        .logo-breadcrumb{font-size:12px;color:var(--cor-texto-secundario);margin-left:4px;}
        .hd-right{display:flex;align-items:center;gap:8px;}
        .btn-hd{background:rgba(210,158,0,.12);border:1px solid var(--cor-admin);color:var(--cor-admin);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;transition:.15s;}
        .btn-hd:hover{background:rgba(210,158,0,.25);}
        .btn-hd-ghost{background:transparent;border:1px solid var(--cor-borda);color:var(--cor-texto-secundario);}
        .btn-hd-ghost:hover{border-color:var(--cor-admin);color:var(--cor-admin);}
        .badge-user{background:rgba(210,158,0,.1);color:var(--cor-admin);padding:4px 10px;border-radius:12px;font-size:12px;font-weight:600;}
        #btnTheme{background:transparent;border:1px solid var(--cor-borda);color:var(--cor-texto-secundario);padding:0;border-radius:6px;cursor:pointer;font-size:14px;display:inline-flex;align-items:center;justify-content:center;height:30px;width:30px;transition:.15s;}
        #btnTheme:hover{border-color:var(--cor-admin);color:var(--cor-admin);}

        .page{max-width:1100px;margin:0 auto;padding:24px;position:relative;z-index:1;}

        .action-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
        .btn-nova{background:linear-gradient(90deg,#b78700,#d29e00);color:#1a1200;border:none;padding:9px 20px;border-radius:var(--borda-radius-pequeno);font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:.15s;}
        .btn-nova:hover{opacity:.9;transform:translateY(-1px);}
        .search-box{background:var(--cor-card);border:1px solid var(--cor-borda);color:var(--cor-texto);padding:8px 13px;border-radius:var(--borda-radius-pequeno);font-size:13px;outline:none;min-width:220px;transition:.15s;}
        .search-box:focus{border-color:var(--cor-admin);}

        .tbl-card{background:var(--cor-card);border:1px solid var(--cor-borda);border-radius:var(--borda-radius);overflow:hidden;box-shadow:var(--sombra-suave);}
        .tbl-hd{padding:13px 18px;border-bottom:1px solid var(--cor-borda);display:flex;justify-content:space-between;align-items:center;}
        .tbl-hd h3{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;}
        .tbl-hd h3 i{color:var(--cor-admin);}
        .tbl-wrap{overflow-x:auto;}
        table{width:100%;border-collapse:collapse;font-size:13px;}
        th{background:rgba(210,158,0,.06);color:var(--cor-texto-secundario);padding:9px 14px;text-align:left;font-weight:700;font-size:11px;white-space:nowrap;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--cor-borda);}
        td{padding:11px 14px;border-top:1px solid var(--cor-borda);vertical-align:middle;}
        tr:hover td{background:rgba(210,158,0,.03);}
        .empty{padding:48px;text-align:center;color:var(--cor-texto-secundario);}
        .empty i{font-size:36px;margin-bottom:10px;display:block;opacity:.4;}
        .badge-ativa{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(26,122,82,.12);color:#1a7a52;}
        .badge-inativa{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(192,32,32,.12);color:#c02020;}
        .codigo{font-family:monospace;font-size:12px;background:rgba(200,146,10,.1);color:var(--cor-admin);padding:2px 7px;border-radius:4px;}
        .btn-act{background:transparent;border:1px solid var(--cor-borda);color:var(--cor-texto-secundario);padding:4px 11px;border-radius:var(--borda-radius-pequeno);cursor:pointer;font-size:11px;font-weight:600;white-space:nowrap;transition:.15s;display:inline-flex;align-items:center;gap:4px;}
        .btn-act:hover{border-color:var(--cor-admin);color:var(--cor-admin);}

        /* Modal */
        .modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center;padding:20px;}
        .modal-ov.open{display:flex;}
        .modal{background:var(--cor-card);border:1px solid var(--cor-borda);border-radius:var(--borda-radius);padding:28px;width:min(520px,94vw);max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);}
        .modal-top-bar{height:4px;background:linear-gradient(90deg,#7a5c00,#c8920a 30%,#f0c840 55%,#c8920a 75%,#7a5c00);border-radius:var(--borda-radius) var(--borda-radius) 0 0;margin:-28px -28px 24px;}
        .modal h3{margin-bottom:18px;font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;}
        .modal h3 i{color:var(--cor-admin);}
        .modal-acts{display:flex;gap:10px;margin-top:20px;justify-content:flex-end;padding-top:16px;border-top:1px solid var(--cor-borda);}

        .fsec{font-size:11px;font-weight:700;color:var(--cor-admin);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 10px;padding-bottom:5px;border-bottom:1px solid var(--cor-borda);}
        .fsec:first-child{margin-top:0;}
        .fg{margin-bottom:13px;}
        .fg label{display:block;font-size:11px;color:var(--cor-texto-secundario);margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
        .fc{width:100%;background:var(--cor-card);border:1px solid var(--cor-borda);color:var(--cor-texto);padding:10px 12px;border-radius:var(--borda-radius-pequeno);font-size:13px;outline:none;transition:.15s;}
        .fc:focus{border-color:var(--cor-admin);box-shadow:0 0 0 3px rgba(200,146,10,.12);}
        [data-theme="dark"] .fc{background:var(--cor-fundo);}
        select.fc option{background:var(--cor-card);}
        .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
        .full{grid-column:1/-1;}
        .btn-p{background:linear-gradient(90deg,#b78700,#d29e00);color:#1a1200;border:none;padding:10px 22px;border-radius:var(--borda-radius-pequeno);font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:.15s;}
        .btn-p:hover{opacity:.9;}
        .btn-p:disabled{opacity:.5;cursor:not-allowed;}
        .btn-g{background:transparent;border:1px solid var(--cor-borda);color:var(--cor-texto-secundario);padding:10px 20px;border-radius:var(--borda-radius-pequeno);font-size:13px;cursor:pointer;transition:.15s;}
        .btn-g:hover{border-color:var(--cor-perigo);color:var(--cor-perigo);}
        .form-msg{font-size:12px;margin-top:10px;min-height:18px;}

        .toast-c{position:fixed;bottom:22px;right:22px;z-index:9999;display:flex;flex-direction:column;gap:7px;}
        .toast-i{padding:11px 16px;border-radius:var(--borda-radius-pequeno);font-size:13px;font-weight:600;min-width:240px;animation:tIn .2s ease;display:flex;align-items:center;gap:8px;}
        .t-ok{background:rgba(26,122,82,.1);border:1px solid #1a7a52;color:#1a7a52;}
        .t-err{background:rgba(192,32,32,.1);border:1px solid #c02020;color:#c02020;}
        @keyframes tIn{from{transform:translateX(40px);opacity:0}to{transform:none;opacity:1}}
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">
        <span class="logo-text"><strong>Link</strong><span> international</span></span>
        <span class="badge-admin">ADMIN</span>
    </div>
    <h1 class="page-title">Lojas</h1>
    <div class="hd-right">
        <span class="badge-user"><i class="fas fa-user-shield" style="margin-right:4px"></i>{{ usuario }}</span>
        <button id="btnTheme" onclick="toggleTheme()" title="Toggle theme"><i class="fas fa-sun"></i></button>
        {% if tipo == 'backoffice_gerente' %}
        <a href="/backoffice/dashboard" class="btn-hd btn-hd-ghost"><i class="fas fa-arrow-left"></i> Back Office</a>
        {% else %}
        <a href="/admin/dashboard" class="btn-hd btn-hd-ghost"><i class="fas fa-arrow-left"></i> Admin</a>
        {% endif %}
        <a href="/logout" class="btn-hd btn-hd-ghost"><i class="fas fa-sign-out-alt"></i> Sign Out</a>
    </div>
</div>

<div class="page">
    <div class="action-bar">
        <button class="btn-nova" onclick="abrirModalNova()">
            <i class="fas fa-plus"></i> New Store
        </button>
        <input type="text" class="search-box" placeholder="Filter by name or code…" oninput="filtrarTabela(this.value)">
    </div>

    <div class="tbl-card">
        <div class="tbl-hd">
            <h3><i class="fas fa-store"></i> Registered Stores <span id="tbl-count" style="color:var(--cor-texto-secundario);font-weight:400;font-size:12px;margin-left:4px;"></span></h3>
            <button class="btn-hd btn-hd-ghost" onclick="carregarLojas()"><i class="fas fa-sync-alt"></i></button>
        </div>
        <div class="tbl-wrap">
            <table>
                <thead><tr>
                    <th>Code</th>
                    <th>Name</th>
                    <th>Manager</th>
                    <th>City</th>
                    <th>Phone</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr></thead>
                <tbody id="lojasBody">
                    <tr><td colspan="7" class="empty"><i class="fas fa-spinner fa-spin"></i></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal Nova/Editar Loja -->
<div class="modal-ov" id="modalLoja">
    <div class="modal">
        <div class="modal-top-bar"></div>
        <h3 id="modalTitulo"><i class="fas fa-store"></i> New Store</h3>

        <div class="fsec">Identification</div>
        <div class="grid2">
            <div class="fg full"><label>Store Name *</label><input id="fNome" type="text" class="fc" placeholder="e.g. Link World Money — Brixton"></div>
            <div class="fg"><label>Code <span style="color:var(--cor-texto-secundario);font-weight:400;">(unique slug)</span></label><input id="fCodigo" type="text" class="fc" placeholder="e.g. brixton" oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9_-]/g,'')"></div>
            <div class="fg"><label>Manager</label><input id="fResponsavel" type="text" class="fc" placeholder="Manager name"></div>
        </div>

        <div class="fsec">Location &amp; Contact</div>
        <div class="grid2">
            <div class="fg full"><label>Address</label><input id="fEndereco" type="text" class="fc" placeholder="Street, number, details"></div>
            <div class="fg"><label>City</label><input id="fCidade" type="text" class="fc" placeholder="London"></div>
            <div class="fg"><label>Phone</label><input id="fTelefone" type="text" class="fc" placeholder="+44 20 0000 0000"></div>
        </div>

        <div class="fsec">Status</div>
        <div class="fg">
            <label>Situation</label>
            <select id="fAtiva" class="fc">
                <option value="true">Active</option>
                <option value="false">Inactive</option>
            </select>
        </div>

        <input type="hidden" id="fLojaId">
        <div class="form-msg" id="formMsg"></div>

        <div class="modal-acts">
            <button class="btn-g" onclick="fecharModal()">Cancel</button>
            <button class="btn-p" id="btnSalvar" onclick="salvarLoja()"><i class="fas fa-save"></i> Save</button>
        </div>
    </div>
</div>

<div class="toast-c" id="toastC"></div>

<script>
let todasLojas = [];

async function carregarLojas() {
    const tb = document.getElementById('lojasBody');
    tb.innerHTML = '<tr><td colspan="7" class="empty"><i class="fas fa-spinner fa-spin"></i></td></tr>';
    try {
        const r = await fetch('/api/admin/lojas');
        const d = await r.json();
        if (!d.success) { tb.innerHTML = `<tr><td colspan="7" style="color:var(--cor-perigo);padding:20px;">${d.message}</td></tr>`; return; }
        todasLojas = d.lojas || [];
        renderTabela(todasLojas);
    } catch(e) {
        tb.innerHTML = `<tr><td colspan="7" style="color:var(--cor-perigo);padding:20px;">${e.message}</td></tr>`;
    }
}

function renderTabela(lista) {
    const tb = document.getElementById('lojasBody');
    document.getElementById('tbl-count').textContent = `(${lista.length})`;
    if (!lista.length) {
        tb.innerHTML = '<tr><td colspan="7" class="empty"><i class="fas fa-store-slash"></i><p>No stores registered</p></td></tr>';
        return;
    }
    tb.innerHTML = lista.map(l => `<tr>
        <td>${l.codigo ? `<span class="codigo">${l.codigo}</span>` : '<span style="color:var(--cor-texto-secundario);">—</span>'}</td>
        <td style="font-weight:600;">${l.nome}</td>
        <td>${l.responsavel || '—'}</td>
        <td>${l.cidade || '—'}</td>
        <td>${l.telefone || '—'}</td>
        <td>${l.ativa !== false ? '<span class="badge-ativa"><i class="fas fa-check"></i> Active</span>' : '<span class="badge-inativa"><i class="fas fa-times"></i> Inactive</span>'}</td>
        <td><button class="btn-act" onclick="abrirModalEditar(${JSON.stringify(l).replace(/"/g,'&quot;')})"><i class="fas fa-edit"></i> Edit</button></td>
    </tr>`).join('');
}

function filtrarTabela(q) {
    const ql = q.toLowerCase();
    renderTabela(todasLojas.filter(l =>
        (l.nome||'').toLowerCase().includes(ql) ||
        (l.codigo||'').toLowerCase().includes(ql) ||
        (l.cidade||'').toLowerCase().includes(ql) ||
        (l.responsavel||'').toLowerCase().includes(ql)
    ));
}

function abrirModalNova() {
    document.getElementById('modalTitulo').innerHTML = '<i class="fas fa-store"></i> New Store';
    ['fLojaId','fNome','fCodigo','fResponsavel','fEndereco','fCidade','fTelefone'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fAtiva').value = 'true';
    document.getElementById('formMsg').innerHTML = '';
    document.getElementById('modalLoja').classList.add('open');
    document.getElementById('fNome').focus();
}

function abrirModalEditar(l) {
    document.getElementById('modalTitulo').innerHTML = '<i class="fas fa-edit"></i> Edit Store';
    document.getElementById('fLojaId').value = l.id || '';
    document.getElementById('fNome').value = l.nome || '';
    document.getElementById('fCodigo').value = l.codigo || '';
    document.getElementById('fResponsavel').value = l.responsavel || '';
    document.getElementById('fEndereco').value = l.endereco || '';
    document.getElementById('fCidade').value = l.cidade || '';
    document.getElementById('fTelefone').value = l.telefone || '';
    document.getElementById('fAtiva').value = String(l.ativa !== false);
    document.getElementById('formMsg').innerHTML = '';
    document.getElementById('modalLoja').classList.add('open');
}

function fecharModal() {
    document.getElementById('modalLoja').classList.remove('open');
}

async function salvarLoja() {
    const btn = document.getElementById('btnSalvar');
    const msg = document.getElementById('formMsg');
    const nome = document.getElementById('fNome').value.trim();
    if (!nome) { msg.innerHTML = '<span style="color:var(--cor-perigo)"><i class="fas fa-exclamation-circle"></i> Name is required.</span>'; return; }

    const id = document.getElementById('fLojaId').value;
    const payload = {
        nome,
        codigo:      document.getElementById('fCodigo').value.trim() || null,
        responsavel: document.getElementById('fResponsavel').value.trim(),
        endereco:    document.getElementById('fEndereco').value.trim(),
        cidade:      document.getElementById('fCidade').value.trim(),
        telefone:    document.getElementById('fTelefone').value.trim(),
        ativa:       document.getElementById('fAtiva').value === 'true',
    };

    btn.disabled = true;
    msg.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving…';
    try {
        const url    = id ? `/api/admin/lojas/${id}` : '/api/admin/lojas';
        const method = id ? 'PUT' : 'POST';
        const r = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        const d = await r.json();
        if (d.success) {
            toast(d.message, 'ok');
            fecharModal();
            carregarLojas();
        } else {
            msg.innerHTML = `<span style="color:var(--cor-perigo)"><i class="fas fa-times-circle"></i> ${d.message}</span>`;
        }
    } catch(e) {
        msg.innerHTML = `<span style="color:var(--cor-perigo)">${e.message}</span>`;
    }
    btn.disabled = false;
}

function toast(m, tipo='ok') {
    const c = document.getElementById('toastC');
    const el = document.createElement('div');
    el.className = `toast-i t-${tipo}`;
    el.innerHTML = `<i class="fas fa-${tipo==='ok'?'check-circle':'times-circle'}"></i> ${m}`;
    c.appendChild(el);
    setTimeout(() => el.remove(), 4000);
}

document.querySelectorAll('.modal-ov').forEach(m => m.addEventListener('click', e => { if (e.target === m) fecharModal(); }));

function toggleTheme() {
    const html = document.documentElement;
    const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    document.getElementById('btnTheme').innerHTML = next === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
}
(function(){
    const t = localStorage.getItem('theme') || 'light';
    document.getElementById('btnTheme').innerHTML = t === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
})();

carregarLojas();
</script>
</body>
</html>
